<meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="ie=edge">
<title>Marble Roulette - Pro Dashboard</title>
<link rel=stylesheet href="./roulette.193c4cf4.css">
<style>
  :root { color-scheme: dark; }
  body { background-color: #000 !important; margin: 0; overflow: hidden; font-size: 13px; }

  /* 메인 UI 컨테이너 */
  .settings {
    display: flex !important;
    flex-direction: row !important;
    gap: 20px !important;
    padding: 15px !important;
    background: rgba(35, 35, 35, 0.95) !important;
    border-radius: 12px !important;
    position: fixed !important;
    bottom: 20px !important;
    left: 20px !important;
    width: auto !important;
    min-width: 800px !important; /* 레이아웃 확보를 위해 너비 확장 */
    align-items: stretch !important;
    border: 1px solid #444 !important;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7) !important;
  }

  /* 왼쪽: 체크박스 영역 */
  .checkbox-section { flex: 0 0 240px !important; display: flex !important; flex-direction: column !important; gap: 8px !important; border-right: 1px solid #444 !important; padding-right: 15px !important; }
  .checkbox-header { display: flex !important; justify-content: space-between !important; align-items: center !important; margin-bottom: 5px !important; }
  .checkbox-header h3 { margin: 0 !important; font-size: 13px !important; color: #fff !important; }
  
  #member-checks {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 6px !important;
  }
  .member-label { cursor: pointer !important; font-size: 12px !important; color: #eee !important; display: flex !important; align-items: center !important; background: #222 !important; padding: 5px 8px !important; border-radius: 4px !important; }
  .member-label:hover { background: #333 !important; }

  /* 중앙: 수동 입력 및 버튼 영역 */
  .input-section { flex: 1 !important; display: flex !important; flex-direction: column !important; gap: 10px !important; }
  #in_names {
    width: 100% !important;
    height: 80px !important;
    background: #111 !important;
    color: #fff !important;
    border: 1px solid #333 !important;
    border-radius: 6px !important;
    padding: 10px !important;
    font-size: 13px !important;
    resize: none !important;
  }

  /* 오른쪽: 설정(맵, 순위) 영역 */
  .config-section { flex: 0 0 180px !important; display: flex !important; flex-direction: column !important; gap: 12px !important; border-left: 1px solid #444 !important; padding-left: 15px !important; justify-content: center !important; }
  .row { display: flex !important; flex-direction: column !important; gap: 5px !important; }
  .row label { color: #888 !important; font-size: 11px !important; }
  select, #in_winningRank { background: #222 !important; color: #eee !important; border: 1px solid #444 !important; height: 28px !important; border-radius: 4px !important; }

  /* 버튼 스타일 */
  .actions { display: flex !important; gap: 6px !important; margin-top: auto !important; }
  .actions button { flex: 1 !important; height: 36px !important; cursor: pointer !important; border-radius: 6px !important; border: none !important; font-weight: bold !important; }
  #btnStart { background: #d32f2f !important; color: #fff !important; }
  #btnShuffle { background: #444 !important; color: #ccc !important; }
  .master-btn { background: #333 !important; color: #aaa !important; border: 1px solid #444 !important; padding: 2px 6px !important; font-size: 10px !important; border-radius: 3px !important; cursor: pointer !important; }

  /* 제거 요소 */
  #notice, .row-toggles, .row-theme, .copyright, .sep { display: none !important; }
</style>

<body>
<div id=settings class=settings>
  <div class="checkbox-section">
    <div class="checkbox-header">
      <h3>멤버 선택</h3>
      <div>
        <button class="master-btn" id="btnSelectAll">전체</button>
        <button class="master-btn" id="btnDeselectAll">해제</button>
      </div>
    </div>
    <div id="member-checks"></div>
  </div>
  
  <div class="input-section">
    <textarea id=in_names placeholder="명단을 직접 수정하거나 체크박스를 사용하세요"></textarea>
    <div class=actions>
      <button id=btnShuffle><i class="icon shuffle"></i> 셔플</button>
      <button id=btnStart><i class="icon play"></i> 시작</button>
    </div>
  </div>

  <div class="config-section">
    <div class=row>
      <label>맵 선택</label>
      <select id=sltMap style="width: 100%;"></select>
    </div>
    <div class=row style="flex-direction:row !important; align-items:center !important; justify-content:space-between !important;">
      <label>순위</label>
      <input type=number id=in_winningRank value=1 min=1 style="width: 50px;">
    </div>
    <div class="btn-group" style="display:flex; gap:2px;">
      <button class="active btn-first-winner" style="flex:1; font-size:10px; padding:4px 0;">처음</button>
      <button class="btn-last-winner" style="flex:1; font-size:10px; padding:4px 0;">마지막</button>
    </div>
  </div>
</div>

<script type=module src="./roulette.31f8fbbf.js"></script>
<script>
  function getNames(){return document.querySelector("#in_names").value.trim().split(/[,\r\n]/g).map(e=>e.trim()).filter(e=>!!e)}
  function getReady(){
    let e=getNames(); ready=e.length>0;
    if(window.roulette) window.roulette.setMarbles(e);
    localStorage.setItem("mbr_names", e.join(","));
  }
  
  function setWinnerRank(e){
    document.querySelector("#in_winningRank").value=e;
    window.options.winningRank=e-1;
    window.roulette.setWinningRank(window.options.winningRank);
    document.querySelector(".btn-first-winner").classList.toggle("active",e===1);
    document.querySelector(".btn-last-winner").classList.toggle("active",e!==1);
  }

  let ready=!1;
  function initialize(){
    if(!window.roulette || !window.roulette.isReady){ setTimeout(initialize, 100); return; }

    window.options.useSkills = false;
    window.options.autoRecording = false;
    window.options.darkMode = true;
    window.roulette.setTheme("dark");

    // --- 멤버 관리 로직 ---
    const members = ["민구", "기태", "찬엽", "민기", "준엽", "왈도", "참루"];
    const checkContainer = document.querySelector("#member-checks");
    const nameInput = document.querySelector("#in_names");

    function refreshChecks() {
        const currentNames = nameInput.value.split(',').map(n => n.trim());
        checkContainer.innerHTML = '';
        members.forEach(name => {
            const isChecked = currentNames.includes(name) ? 'checked' : '';
            const label = document.createElement('label');
            label.className = 'member-label';
            label.innerHTML = `<input type="checkbox" value="${name}" ${isChecked} style="margin-right:6px;">${name}`;
            
            label.querySelector('input').addEventListener('change', (e) => {
                let names = nameInput.value.split(',').map(n => n.trim()).filter(n => n !== "");
                if (e.target.checked) { if (!names.includes(e.target.value)) names.push(e.target.value); } 
                else { names = names.filter(n => n !== e.target.value); }
                nameInput.value = names.join(',');
                getReady();
            });
            checkContainer.appendChild(label);
        });
    }

    // 전체 선택 / 해제 버튼 이벤트
    document.querySelector("#btnSelectAll").addEventListener("click", () => {
        nameInput.value = members.join(",");
        refreshChecks();
        getReady();
    });
    document.querySelector("#btnDeselectAll").addEventListener("click", () => {
        nameInput.value = "";
        refreshChecks();
        getReady();
    });

    let saved = localStorage.getItem("mbr_names");
    nameInput.value = (saved !== null) ? saved : members.join(",");
    
    refreshChecks();
    nameInput.addEventListener('input', refreshChecks);

    // 기본 이벤트
    document.querySelector("#btnShuffle").addEventListener("click", getReady);
    document.querySelector("#btnStart").addEventListener("click", () => { if(ready) window.roulette.start(); });
    document.querySelector(".btn-last-winner").addEventListener("click", () => setWinnerRank(window.roulette.getCount()));
    document.querySelector(".btn-first-winner").addEventListener("click", () => setWinnerRank(1));
    
    let i = window.roulette.getMaps(), a = document.querySelector("#sltMap");
    i.forEach(e => {
        let t = document.createElement("option");
        t.value = e.index; t.innerHTML = e.title; a.append(t);
    });
    a.addEventListener("change", e => window.roulette.setMap(e.target.value));
    
    getReady();
  }
  document.addEventListener("DOMContentLoaded", initialize);
</script>
</body></html>
