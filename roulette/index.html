<!DOCTYPE html><html lang=en>
<script type=importmap>
{
  "imports": {
    "2rDQN": "./Box2D.simd.dd31b167.wasm",
    "8BShk": "./Box2D.simd.13a3a125.js",
    "9DwmV": "./kkwak.673a610d.png",
    "h7cmx": "./Box2D.b9b16b27.wasm",
    "ilUZb": "./Box2D.4b04ba8e.js"
  }

<meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="ie=edge">
<title>Marble Roulette - Checkbox Edition</title>
<link rel=stylesheet href="./roulette.193c4cf4.css">
<style>
  :root { color-scheme: dark; }
  body { background-color: #000 !important; margin: 0; overflow: hidden; font-family: sans-serif; }

  /* 전체 UI 레이아웃 */
  .settings {
    display: flex !important;
    flex-direction: row !important;
    gap: 15px !important;
    padding: 15px !important;
    background: rgba(30, 30, 30, 0.95) !important;
    border-radius: 12px !important;
    position: fixed !important;
    bottom: 20px !important;
    left: 20px !important; /* 왼쪽 하단 고정 */
    min-width: 550px !important;
    border: 1px solid #444 !important;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
  }

  /* 왼쪽: 멤버 체크박스 영역 */
  .member-list {
    flex: 0 0 220px !important;
    display: grid !important;
    grid-template-columns: 1fr 1fr !important; /* 2줄 정렬 */
    gap: 8px !important;
    border-right: 1px solid #444 !important;
    padding-right: 15px !important;
  }
  
  .member-item {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    cursor: pointer !important;
    color: #eee !important;
    font-size: 13px !important;
    padding: 5px !important;
    background: #222 !important;
    border-radius: 4px !important;
    transition: 0.2s;
  }
  .member-item:hover { background: #333 !important; }
  .member-item input { cursor: pointer !important; width: 16px; height: 16px; }

  /* 오른쪽: 제어 영역 */
  .control-panel {
    flex: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 12px !important;
    justify-content: center !important;
  }

  /* 맵/순위 설정 한 줄 정렬 */
  .row { display: flex !important; align-items: center !important; gap: 8px !important; font-size: 12px !important; color: #aaa !important; }
  select, #in_winningRank {
    background: #111 !important; color: #fff !important; border: 1px solid #444 !important;
    height: 26px !important; border-radius: 4px !important; flex: 1 !important;
  }

  /* 버튼 영역 */
  .actions { display: flex !important; gap: 8px !important; margin-top: 5px !important; }
  .actions button {
    flex: 1 !important; height: 36px !important; border: none !important; border-radius: 6px !important;
    font-weight: bold !important; cursor: pointer !important; display: flex !important;
    align-items: center !important; justify-content: center !important; gap: 5px !important;
  }
  #btnStart { background: #ce4242 !important; color: white !important; }
  #btnShuffle { background: #444 !important; color: #ddd !important; }

  /* 불필요 요소 제거 */
  #notice, .row-toggles, .row-theme, .copyright, #in_names, h3 { display: none !important; }
</style>

<body>
<div class=settings>
  <div id=memberList class=member-list>
    </div>

  <div class=control-panel>
    <div class=row>
      <label>맵</label>
      <select id=sltMap></select>
    </div>
    <div class=row>
      <label>순위</label>
      <div class="btn-group" style="display:flex; gap:2px;">
        <button class="active btn-first-winner" style="padding:2px 6px; font-size:10px;">처음</button>
        <button class="btn-last-winner" style="padding:2px 6px; font-size:10px;">마지막</button>
      </div>
      <input type=number id=in_winningRank value=1 min=1 style="width:40px; flex:none !important;">
    </div>
    
    <div class=actions>
      <button id=btnShuffle><i class="icon shuffle"></i> 셔플</button>
      <button id=btnStart><i class="icon play"></i> 시작</button>
    </div>
  </div>
</div>

<textarea id=in_names style="display:none !important;"></textarea>

<script type=module src="./roulette.31f8fbbf.js"></script>
<script>
  // 1. 고정 멤버 명단 (여기서 이름만 수정하세요!)
  const MEMBERS = ["민구", "기태", "찬엽", "민기", "준엽", "석준", "동근"];

  function setupMemberList() {
    const container = document.getElementById('memberList');
    const saved = JSON.parse(localStorage.getItem('selected_members') || '[]');
    
    MEMBERS.forEach(name => {
      const label = document.createElement('label');
      label.className = 'member-item';
      const isChecked = saved.length === 0 || saved.includes(name) ? 'checked' : '';
      label.innerHTML = `<input type="checkbox" value="${name}" ${isChecked}> ${name}`;
      container.appendChild(label);
      
      label.querySelector('input').addEventListener('change', updateRouletteNames);
    });
  }

  function updateRouletteNames() {
    const selected = Array.from(document.querySelectorAll('#memberList input:checked')).map(el => el.value);
    document.querySelector("#in_names").value = selected.join(",");
    localStorage.setItem('selected_members', JSON.stringify(selected));
    
    if(window.roulette && window.roulette.isReady) {
      window.roulette.setMarbles(selected);
      ready = selected.length > 0;
    }
  }

  // 기본 엔진 로직
  function setWinnerRank(e){
    document.querySelector("#in_winningRank").value=e;
    window.options.winningRank=e-1;
    window.roulette.setWinningRank(window.options.winningRank);
    document.querySelector(".btn-first-winner").classList.toggle("active",e===1);
    document.querySelector(".btn-last-winner").classList.toggle("active",e!==1);
  }

  let ready = false;
  function initialize() {
    if(!window.roulette || !window.roulette.isReady) { setTimeout(initialize, 100); return; }
    
    window.options.useSkills = false;
    window.options.autoRecording = false;
    window.options.darkMode = true;
    window.roulette.setTheme("dark");

    setupMemberList();
    updateRouletteNames();

    document.querySelector("#btnShuffle").addEventListener("click", updateRouletteNames);
    document.querySelector("#btnStart").addEventListener("click", () => { if(ready) window.roulette.start(); });
    document.querySelector(".btn-last-winner").addEventListener("click", () => setWinnerRank(window.roulette.getCount()));
    document.querySelector(".btn-first-winner").addEventListener("click", () => setWinnerRank(1));

    // 맵 로드
    let i=window.roulette.getMaps(), a=document.querySelector("#sltMap");
    i.forEach(e => { let t=document.createElement("option"); t.value=e.index; t.innerHTML=e.title; a.append(t); });
    a.addEventListener("change", e => window.roulette.setMap(e.target.value));
  }

  document.addEventListener("DOMContentLoaded", initialize);
</script>
</body></html>
