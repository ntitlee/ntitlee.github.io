<meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="ie=edge">
<title>Marble Roulette - Checkbox Fix</title>
<link rel=stylesheet href="./roulette.193c4cf4.css">
<style>
  :root { color-scheme: dark; }
  body { background-color: #000 !important; margin: 0; overflow: hidden; font-size: 13px; }

  /* UI 전체 컨테이너 */
  .settings {
    display: flex !important;
    flex-direction: row !important;
    gap: 20px !important;
    padding: 15px 20px !important;
    background: rgba(30, 30, 30, 0.98) !important;
    border-radius: 12px !important;
    position: fixed !important;
    bottom: 25px !important;
    left: 25px !important;
    min-width: 550px !important;
    border: 1px solid #444 !important;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
  }

  /* 왼쪽: 인원 선택 섹션 */
  .left-side {
    flex: 0 0 260px !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 10px !important;
    border-right: 1px solid #555 !important;
    padding-right: 20px !important;
  }
  .header-row { display: flex !important; justify-content: space-between !important; align-items: center !important; }
  .header-row h3 { margin: 0 !important; font-size: 14px !important; color: #fff !important; }
  
  #member-checks { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 6px !important; }

  /* 체크박스 라벨 컨테이너 */
  .m-label { 
    cursor: pointer !important; 
    display: flex !important; 
    align-items: center !important; 
    background: #222 !important; 
    padding: 8px 10px !important; 
    border-radius: 6px !important; 
    color: #fff !important; 
    font-size: 13px !important; 
    border: 1px solid #444 !important;
    position: relative !important;
    transition: background 0.2s;
  }
  .m-label:hover { background: #333 !important; }

  /* 핵심: 기존 체크박스는 투명하게 숨기고 커스텀 디자인만 노출 */
  .m-label input { 
    opacity: 0 !important; /* 완전히 숨김 */
    position: absolute !important;
    cursor: pointer !important;
  }

  /* 가짜 체크박스 (디자인용) */
  .custom-check {
    width: 16px !important;
    height: 16px !important;
    border: 2px solid #666 !important;
    border-radius: 3px !important;
    margin-right: 10px !important;
    display: inline-block !important;
    position: relative !important;
    background: #111 !important;
    flex-shrink: 0 !important;
  }

  /* 실제 input이 체크되었을 때 가짜 체크박스 스타일 변경 */
  .m-label input:checked + .custom-check {
    background-color: #d32f2f !important;
    border-color: #d32f2f !important;
  }
  .m-label input:checked + .custom-check::after {
    content: '✔' !important;
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    color: white !important;
    font-size: 11px !important;
  }

  /* 오른쪽 설정 영역 */
  .right-side {
    flex: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 12px !important;
    justify-content: center !important;
  }
  .config-row { display: flex !important; align-items: center !important; justify-content: space-between !important; gap: 10px !important; }
  .config-row label { color: #aaa !important; font-size: 12px !important; }
  
  select, #in_winningRank { 
    background: #1a1a1a !important; color: #fff !important; border: 1px solid #555 !important; 
    height: 28px !important; border-radius: 4px !important; padding: 0 5px !important;
  }

  .rank-btns { display: flex !important; gap: 2px !important; }
  .rank-btns button { 
    font-size: 11px !important; padding: 4px 8px !important; background: #333 !important; 
    border: 1px solid #444 !important; border-radius: 4px !important; color: #888 !important; cursor: pointer !important; 
  }
  .rank-btns button.active { background: #555 !important; color: #fff !important; }

  .btn-actions { display: flex !important; gap: 8px !important; margin-top: 5px !important; }
  .btn-actions button { 
    flex: 1 !important; height: 38px !important; cursor: pointer !important; 
    border-radius: 8px !important; border: none !important; font-weight: bold !important; font-size: 14px !important; 
  }
  #btnStart { background: #d32f2f !important; color: #fff !important; }
  #btnShuffle { background: #444 !important; color: #ddd !important; }

  .m-btn { background: #333 !important; color: #bbb !important; border: 1px solid #444 !important; padding: 3px 8px !important; font-size: 11px !important; cursor: pointer !important; border-radius: 4px !important; }

  #notice, #btnNotice, #btnShop, .row-toggles, .row-theme, .copyright, .sep, #in_names_visible { display: none !important; }
</style>

<body>
<div id=settings class=settings>
  <div class="left-side">
    <div class="header-row">
      <h3>인원 선택</h3>
      <div>
        <button class="m-btn" id="allOn">전체</button>
        <button class="m-btn" id="allOff">해제</button>
      </div>
    </div>
    <div id="member-checks"></div>
  </div>
  
  <div class="right-side">
    <div class="config-row">
      <label>맵</label>
      <select id=sltMap style="width: 140px;"></select>
    </div>
    <div class="config-row">
      <label>순위</label>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="rank-btns">
          <button id="setFirst" class="active">처음</button>
          <button id="setLast">마지막</button>
        </div>
        <input type=number id=in_winningRank value=1 min=1 style="width: 45px;">
      </div>
    </div>
    <div class="btn-actions">
      <button id=btnShuffle>셔플</button>
      <button id=btnStart>시작</button>
    </div>
  </div>
</div>

<textarea id="in_names" style="display:none !important;"></textarea>

<script type=module src="./roulette.31f8fbbf.js"></script>
<script>
  const MEMBERS = ["민구", "기태", "찬엽", "민기", "준영", "석준", "동근", "예비1"];
  const DEFAULT_SELECTED = ["민구", "기태", "찬엽", "민기", "준영", "석준", "동근"];

  function getNames(){return document.querySelector("#in_names").value.split(',').map(e=>e.trim()).filter(e=>!!e)}
  function getReady(){
    let e=getNames(); ready=e.length>0;
    if(window.roulette) window.roulette.setMarbles(e);
    localStorage.setItem("mbr_names", e.join(","));
  }
  
  function setWinnerRank(val){
    document.querySelector("#in_winningRank").value = val;
    window.options.winningRank = val - 1;
    window.roulette.setWinningRank(window.options.winningRank);
    document.querySelector("#setFirst").classList.toggle("active", val === 1);
    document.querySelector("#setLast").classList.toggle("active", val !== 1);
  }

  let ready=!1;
  function initialize(){
    if(!window.roulette || !window.roulette.isReady){ setTimeout(initialize, 100); return; }
    
    window.options.useSkills = false;
    window.options.autoRecording = false;
    window.options.darkMode = true;
    window.roulette.setTheme("dark");

    const nameInput = document.querySelector("#in_names");
    const checkArea = document.querySelector("#member-checks");

    function drawChecks() {
      const current = nameInput.value.split(',').map(n=>n.trim());
      checkArea.innerHTML = '';
      MEMBERS.forEach(name => {
        const isChecked = current.includes(name) ? 'checked' : '';
        const label = document.createElement('label');
        label.className = 'm-label';
        // 가짜 체크박스 span 추가
        label.innerHTML = `<input type="checkbox" value="${name}" ${isChecked}><span class="custom-check"></span><span class="m-text">${name}</span>`;
        
        label.querySelector('input').addEventListener('change', (e)=>{
          let arr = nameInput.value.split(',').map(n=>n.trim()).filter(n=>!!n);
          if(e.target.checked) { if(!arr.includes(name)) arr.push(name); }
          else { arr = arr.filter(n=>n!==name); }
          nameInput.value = arr.join(',');
          getReady();
        });
        checkArea.appendChild(label);
      });
    }

    document.querySelector("#allOn").addEventListener("click", ()=>{ nameInput.value=MEMBERS.join(','); drawChecks(); getReady(); });
    document.querySelector("#allOff").addEventListener("click", ()=>{ nameInput.value=''; drawChecks(); getReady(); });
    document.querySelector("#setFirst").addEventListener("click", ()=>setWinnerRank(1));
    document.querySelector("#setLast").addEventListener("click", ()=>{
      const count = getNames().length;
      if(count > 0) setWinnerRank(count);
    });

    let saved = localStorage.getItem("mbr_names");
    nameInput.value = (saved !== null) ? saved : DEFAULT_SELECTED.join(',');
    drawChecks();

    document.querySelector("#btnShuffle").addEventListener("click", getReady);
    document.querySelector("#btnStart").addEventListener("click", () => { if(ready) window.roulette.start(); });
    
    let i = window.roulette.getMaps(), a = document.querySelector("#sltMap");
    i.forEach(e => { let t = document.createElement("option"); t.value = e.index; t.innerHTML = e.title; a.append(t); });
    a.addEventListener("change", e => window.roulette.setMap(e.target.value));
    
    getReady();
  }
  document.addEventListener("DOMContentLoaded", initialize);
</script>
</body></html>
