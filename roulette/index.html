<meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="ie=edge">
<title>Marble Roulette - Pro Minimal v2</title>
<link rel=stylesheet href="./roulette.193c4cf4.css">
<style>
  :root { color-scheme: dark; }
  body { background-color: #000 !important; margin: 0; overflow: hidden; font-size: 13px; font-family: sans-serif; }

  /* 1. UI 전체 컨테이너 */
  .settings {
    display: flex !important;
    flex-direction: row !important;
    gap: 15px !important;
    padding: 12px 15px !important;
    background: rgba(40, 40, 40, 0.95) !important;
    border-radius: 10px !important;
    position: fixed !important;
    bottom: 20px !important;
    left: 20px !important;
    width: auto !important;
    min-width: 460px !important;
    border: 1px solid #444 !important;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
  }

  /* 2. 왼쪽: 인원 선택 섹션 */
  .left-side {
    flex: 0 0 190px !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 8px !important;
    border-right: 1px solid #555 !important;
    padding-right: 15px !important;
  }
  .header-row { display: flex !important; justify-content: space-between !important; align-items: center !important; }
  .header-row h3 { margin: 0 !important; font-size: 12px !important; color: #aaa !important; font-weight: normal !important; }
  
  #member-checks { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 4px !important; }
  .m-label { 
    cursor: pointer !important; display: flex !important; align-items: center !important; 
    background: #2a2a2a !important; padding: 4px 8px !important; border-radius: 4px !important; 
    color: #eee !important; font-size: 11px !important; border: 1px solid transparent;
  }
  .m-label:hover { background: #383838 !important; }
  
  /* 체크박스 크기 축소 */
  .m-label input { 
    width: 12px !important; height: 12px !important; margin-right: 6px !important; 
    cursor: pointer !important; accent-color: #d32f2f;
  }

  /* 3. 오른쪽: 설정 및 버튼 섹션 */
  .right-side {
    flex: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    gap: 10px !important;
    justify-content: center !important;
  }
  .config-row { display: flex !important; align-items: center !important; justify-content: space-between !important; gap: 8px !important; }
  .config-row label { color: #888 !important; font-size: 11px !important; white-space: nowrap !important; }
  
  select, #in_winningRank { 
    background: #1a1a1a !important; color: #fff !important; border: 1px solid #555 !important; 
    height: 24px !important; border-radius: 4px !important; font-size: 11px !important; 
  }

  /* 순위 버튼 그룹 */
  .rank-btns { display: flex !important; gap: 2px !important; }
  .rank-btns button { 
    font-size: 10px !important; padding: 2px 6px !important; background: #333 !important; 
    border: 1px solid #444 !important; border-radius: 3px !important; color: #888 !important; cursor: pointer !important; 
  }
  .rank-btns button.active { background: #555 !important; color: #fff !important; border-color: #666 !important; }

  /* 메인 버튼 */
  .btn-actions { display: flex !important; gap: 5px !important; margin-top: 5px !important; }
  .btn-actions button { 
    flex: 1 !important; height: 34px !important; cursor: pointer !important; 
    border-radius: 6px !important; border: none !important; font-weight: bold !important; font-size: 12px !important; 
  }
  #btnStart { background: #ce4242 !important; color: #fff !important; }
  #btnShuffle { background: #444 !important; color: #ddd !important; }

  .m-btn { 
    background: #333 !important; color: #999 !important; border: 1px solid #444 !important; 
    padding: 1px 4px !important; font-size: 10px !important; cursor: pointer !important; border-radius: 3px !important; 
  }
  .m-btn:hover { color: #fff; background: #444 !important; }

  /* 불필요 요소 제거 */
  #notice, #btnNotice, #btnShop, .row-toggles, .row-theme, .copyright, .sep, #in_names_visible { display: none !important; }
</style>

<body>
<div id=settings class=settings>
  <div class="left-side">
    <div class="header-row">
      <h3>인원 선택</h3>
      <div>
        <button class="m-btn" id="allOn">전체</button>
        <button class="m-btn" id="allOff">해제</button>
      </div>
    </div>
    <div id="member-checks"></div>
  </div>
  
  <div class="right-side">
    <div class="config-row">
      <label>맵</label>
      <select id=sltMap style="width: 120px;"></select>
    </div>
    <div class="config-row">
      <label>순위</label>
      <div style="display:flex; align-items:center; gap:4px;">
        <div class="rank-btns">
          <button id="setFirst" class="active">처음</button>
          <button id="setLast">마지막</button>
        </div>
        <input type=number id=in_winningRank value=1 min=1 style="width: 35px;">
      </div>
    </div>
    <div class="btn-actions">
      <button id=btnShuffle>셔플</button>
      <button id=btnStart>시작</button>
    </div>
  </div>
</div>

<textarea id="in_names" style="display:none !important;"></textarea>

<script type=module src="./roulette.31f8fbbf.js"></script>
<script>
  const MEMBERS = ["민구", "기태", "찬엽", "민기", "준영", "석준", "동근"];

  function getNames(){return document.querySelector("#in_names").value.split(',').map(e=>e.trim()).filter(e=>!!e)}
  function getReady(){
    let e=getNames(); ready=e.length>0;
    if(window.roulette) window.roulette.setMarbles(e);
    localStorage.setItem("mbr_names", e.join(","));
  }
  
  function setWinnerRank(val){
    document.querySelector("#in_winningRank").value = val;
    window.options.winningRank = val - 1;
    window.roulette.setWinningRank(window.options.winningRank);
    
    // 버튼 활성화 표시
    document.querySelector("#setFirst").classList.toggle("active", val === 1);
    document.querySelector("#setLast").classList.toggle("active", val !== 1);
  }

  let ready=!1;
  function initialize(){
    if(!window.roulette || !window.roulette.isReady){ setTimeout(initialize, 100); return; }
    
    window.options.useSkills = false;
    window.options.autoRecording = false;
    window.options.darkMode = true;
    window.roulette.setTheme("dark");
    if(window.keywordService) window.keywordService = null;

    const nameInput = document.querySelector("#in_names");
    const checkArea = document.querySelector("#member-checks");

    function drawChecks() {
      const current = nameInput.value.split(',').map(n=>n.trim());
      checkArea.innerHTML = '';
      MEMBERS.forEach(name => {
        const isChecked = current.includes(name) ? 'checked' : '';
        const label = document.createElement('label');
        label.className = 'm-label';
        label.innerHTML = `<input type="checkbox" value="${name}" ${isChecked}>${name}`;
        label.querySelector('input').addEventListener('change', (e)=>{
          let arr = nameInput.value.split(',').map(n=>n.trim()).filter(n=>!!n);
          if(e.target.checked) { if(!arr.includes(name)) arr.push(name); }
          else { arr = arr.filter(n=>n!==name); }
          nameInput.value = arr.join(',');
          getReady();
        });
        checkArea.appendChild(label);
      });
    }

    document.querySelector("#allOn").addEventListener("click", ()=>{ nameInput.value=MEMBERS.join(','); drawChecks(); getReady(); });
    document.querySelector("#allOff").addEventListener("click", ()=>{ nameInput.value=''; drawChecks(); getReady(); });
    
    // 순위 버튼 로직 복구
    document.querySelector("#setFirst").addEventListener("click", ()=>setWinnerRank(1));
    document.querySelector("#setLast").addEventListener("click", ()=>{
      const count = getNames().length;
      if(count > 0) setWinnerRank(count);
    });

    let saved = localStorage.getItem("mbr_names");
    nameInput.value = (saved !== null) ? saved : MEMBERS.join(',');
    drawChecks();

    document.querySelector("#btnShuffle").addEventListener("click", getReady);
    document.querySelector("#btnStart").addEventListener("click", () => { if(ready) window.roulette.start(); });
    
    let i = window.roulette.getMaps(), a = document.querySelector("#sltMap");
    i.forEach(e => { let t = document.createElement("option"); t.value = e.index; t.innerHTML = e.title; a.append(t); });
    a.addEventListener("change", e => window.roulette.setMap(e.target.value));
    
    getReady();
  }
  document.addEventListener("DOMContentLoaded", initialize);
</script>
</body></html>
