<meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="ie=edge">
<title>Marble Roulette - Minimal</title>
<meta name=viewport content="width=device-width, initial-scale=1.0">
<link rel=stylesheet href="./roulette.193c4cf4.css">
<style>
  /* 1. 다크모드 강제 고정 및 배경 설정 */
  :root { color-scheme: dark; }
  body { background-color: #000 !important; margin: 0; overflow: hidden; font-size: 13px; }

  /* 2. 전체 UI 레이아웃 최적화 (왼쪽 하단 고정) */
  .settings {
    display: flex !important;
    flex-direction: row !important;
    gap: 15px !important;
    padding: 12px !important;
    background: rgba(40, 40, 40, 0.9) !important;
    border-radius: 8px !important;
    
    /* 위치 설정: 왼쪽 하단으로 이동 */
    position: fixed !important;
    bottom: 20px !important;  /* 하단에서 20px 띄움 */
    left: 20px !important;    /* 왼쪽에서 20px 띄움 */
    right: auto !important;   /* 오른쪽 자동 */
    transform: none !important; /* 기존 가운데 정렬 해제 */
    
    width: auto !important;
    min-width: 600px !important; 
    align-items: flex-end !important;
    border: 1px solid #444 !important;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important; /* 약간의 그림자로 입체감 추가 */
  }

  /* 3. 좌측: 이름 입력 및 실행 버튼 */
  .left { flex: 0 0 350px !important; display: flex !important; flex-direction: column !important; gap: 8px !important; }
  .left h3 { margin: 0 0 2px 0 !important; font-size: 13px !important; color: #ccc; }
  #in_names {
    width: 100% !important;
    height: 70px !important;
    background: #1a1a1a !important;
    color: #fff !important;
    border: 1px solid #333 !important;
    border-radius: 4px !important;
    padding: 8px !important;
    font-size: 12px !important;
    resize: none !important;
  }

  /* 하단 실행 버튼 정렬 */
  .actions { display: flex !important; gap: 6px !important; align-items: center !important; }
  .actions button {
    flex: 1 !important;
    height: 32px !important;
    font-size: 13px !important;
    cursor: pointer !important;
    border-radius: 4px !important;
    border: none !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 4px !important;
  }
  #btnStart { background: #4a4a4a !important; color: #fff !important; font-weight: bold; }
  #btnShuffle { background: #333 !important; color: #bbb !important; }

  /* 4. 우측: 맵 및 당첨 설정 (불필요 요소 제거됨) */
  .right { flex: 1 !important; display: flex !important; flex-direction: column !important; gap: 10px !important; padding-bottom: 5px; }
  .row { display: flex !important; align-items: center !important; gap: 10px !important; white-space: nowrap !important; }
  .row label { min-width: 60px !important; color: #aaa !important; font-size: 12px !important; }
  
  select, #in_winningRank {
    background: #222 !important;
    color: #eee !important;
    border: 1px solid #444 !important;
    height: 28px !important;
    border-radius: 4px !important;
    font-size: 12px !important;
    padding: 0 5px !important;
  }

  .btn-group { display: flex !important; gap: 2px !important; }
  .btn-group button { 
    padding: 4px 8px !important; 
    font-size: 11px !important; 
    background: #333 !important; 
    color: #888 !important; 
    border: 1px solid #444 !important;
  }
  .btn-group button.active { background: #555 !important; color: #fff !important; }

  /* 5. 숨김 처리 (사용하지 않는 기능들) */
  #notice, #btnNotice, #btnShop, .row-toggles, .row-theme, .btn-toggle-settings, .copyright, .sep {
    display: none !important;
  }
</style>

<body>
<div id=settings class=settings>
  <div class=left>
    <h3>이름들을 입력하세요</h3>
    <textarea id=in_names placeholder="콤마나 줄바꿈으로 구분">수박*2,키위*2,귤*2</textarea>
    <div class=actions>
      <button id=btnShuffle><i class="icon shuffle"></i> 셔플</button>
      <button id=btnStart><i class="icon play"></i> 시작</button>
    </div>
  </div>
  
  <div class=right>
    <div class=row>
      <label>맵 선택</label>
      <select id=sltMap style="width: 100%;"></select>
    </div>
    <div class=row>
      <label>당첨 순위</label>
      <div class=btn-group>
        <button class="active btn-first-winner">첫번째</button>
        <button class="btn-last-winner">마지막</button>
      </div>
      <input type=number id=in_winningRank value=1 min=1 style="width: 50px;">
    </div>
  </div>
</div>

<script type=module src="./roulette.31f8fbbf.js"></script>
<script>
  // 핵심 로직만 유지, 테마/녹화/스킬/공지 관련 코드 제거
  function getNames(){return document.querySelector("#in_names").value.trim().split(/[,\r\n]/g).map(e=>e.trim()).filter(e=>!!e)}
  function parseName(e){let t=/(\/\d+)/,n=/(\*\d+)/,o=t.test(e),i=n.test(e),a=/^\s*([^\/*]+)?/.exec(e)[1];return{name:a,weight:o?parseInt(t.exec(e)[1].replace("/","")):1,count:i?parseInt(n.exec(e)[1].replace("*","")):1}}
  function getReady(){let e=getNames();ready=e.length>0;window.roulette.setMarbles(e);localStorage.setItem("mbr_names",e.join(","));}
  function setWinnerRank(e){document.querySelector("#in_winningRank").value=e;window.options.winningRank=e-1;window.roulette.setWinningRank(window.options.winningRank);
    document.querySelector(".btn-first-winner").classList.toggle("active",e===1);
    document.querySelector(".btn-last-winner").classList.toggle("active",e!==1);}

  let ready=!1, winnerType="first";
  function initialize(){
    if(!window.roulette || !window.roulette.isReady){
        setTimeout(initialize, 100);
        return;
    }

    // 1. 불필요한 외부 통신(KeywordService) 시도 자체를 안 하도록 설정
    // 원본 JS 내부에 해당 로직이 있다면, 아래처럼 옵션을 강제로 꺼버리는 것이 최선입니다.
    if(window.keywordService) window.keywordService = null; 

    // 2. 기본 설정 강제 고정
    window.options.useSkills = false;
    window.options.autoRecording = false;
    window.options.darkMode = true;
    window.roulette.setTheme("dark");

    // 3. 로컬 스토리지 데이터 복구
    let e = localStorage.getItem("mbr_names");
    if(e) document.querySelector("#in_names").value = e;

    // 4. 이벤트 리스너 등록
    document.querySelector("#in_names").addEventListener("input", getReady);
    document.querySelector("#btnShuffle").addEventListener("click", getReady);
    document.querySelector("#btnStart").addEventListener("click", () => {
        if(ready) window.roulette.start();
    });
    
    document.querySelector(".btn-last-winner").addEventListener("click", () => {
        setWinnerRank(window.roulette.getCount());
    });
    document.querySelector(".btn-first-winner").addEventListener("click", () => {
        setWinnerRank(1);
    });
    
    // 5. 맵 로드 및 설정
    let i = window.roulette.getMaps(), a = document.querySelector("#sltMap");
    i.forEach(e => {
        let t = document.createElement("option");
        t.value = e.index;
        t.innerHTML = e.title;
        a.append(t);
    });
    a.addEventListener("change", e => {
        window.roulette.setMap(e.target.value);
    });
    
    getReady();
    console.log("Minimal UI Initialized: External requests blocked.");
}
  document.addEventListener("DOMContentLoaded",initialize);
</script>
</body></html>
