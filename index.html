<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Gem Value Pro</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --danger: #ff4d4f;
            --highlight: #ffcc00; 
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1850px; margin: 0 auto; }
        
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .list-header, .list-row { 
            display: grid; 
            grid-template-columns: 180px 100px 100px 140px 180px 280px 250px 1fr; 
            gap: 12px; align-items: center; text-align: center; font-size: 0.85rem;
        }
        .list-header { background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 15px 12px; border-bottom: 1px solid var(--border); transition: transform 0.2s; }
        .list-row:hover { background: #2a2a2a; }

        .max-level-row { border: 2px solid var(--highlight) !important; box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.1); }

        .char-info { text-align: left; padding-left: 10px; }
        .char-name { font-weight: 800; color: #fff; display: block; }
        .level { font-weight: 800; color: #fff; } 
        
        .ap-box, .ag-box, .gem-box { text-align: left; line-height: 1.6; }
        .ag-group { margin-bottom: 6px; display: block; }
        .ag-slot { display: inline-flex; align-items: center; margin-right: 12px; }
        .ag-icon { width: 15px; height: 15px; margin-right: 4px; border-radius: 2px; }
        
        .loading { text-align: center; padding: 50px; color: #666; font-weight: 700; }
        .gem-text { font-size: 0.8rem; color: #aaa; }
        .gold-text { color: #ffcc00; font-size: 0.85rem; margin-top: 6px; font-weight: 800; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #fff; margin-bottom: 25px;">📊 LOA NTI Dashboard <span style="font-size: 1rem; color: #666;">(Gem Value Sync)</span></h1>
    <div class="tabs" id="tabMenu"><button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button></div>
    <div id="tabContents"></div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwGkUNXR8uGB_ouu9qsrDKt7ws6stnmCVA0Hs-sF9xd0fhMwcBtBxeQtGwrPzglUxiLmw/exec"; 

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name); menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content';
            content.style.display = "none";
            content.innerHTML = `
                <div class="list-header">
                    <div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력(DB)</div><div>아크패시브</div><div>아크그리드</div><div>보석 가치 (거래가능)</div>
                </div>
                <div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    async function syncCombatPower(charName, currentCP) {
        if (!GAS_WEB_APP_URL) return null;
        try {
            await fetch(GAS_WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ charName, currentCP }) });
            const res = await fetch(GAS_WEB_APP_URL);
            const dbData = await res.json();
            const row = dbData.find(r => r[0] === charName);
            return row ? { val: row[1], time: row[2] } : null;
        } catch (e) { return null; }
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (MEMBERS[tabName]) fetchListData(tabName, MEMBERS[tabName]);
    }

    async function fetchListData(mName, cName) {
        const listContainer = document.getElementById(`list-${mName}`);
        listContainer.innerHTML = '<div class="loading">📡 시세 정보 및 캐릭터 동기화 중...</div>';
        const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };

        try {
            // 1. 보석 시세 조회
            const marketRes = await fetch(`${BASE_URL}/markets/items`, {
                method: 'POST', headers,
                body: JSON.stringify({ CategoryCode: 210000, ItemTier: null, PageNo: 1, SortCondition: "ASC" })
            });
            const priceData = await marketRes.json();
            const prices = {};
            priceData.Items?.forEach(item => { prices[item.Name] = item.CurrentMinPrice; });

            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, { headers });
            const siblings = await sibRes.json();
            
            const targets = siblings
                .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            const maxLevelValue = targets[0].ItemAvgLevel; 

            listContainer.innerHTML = "";
            for (const char of targets) {
                const [pRes, apRes, agRes, gRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkgrid`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/gems`, { headers })
                ]);

                const pData = await pRes.json();
                const apData = await apRes.json();
                const agData = await agRes.json();
                const gData = await gRes.json();

                let cpValue = parseInt(String(pData?.CombatPower || "0").replace(/,/g, ""));
                
                // 2. 아크패시브/그리드 처리 (요청 조건 반영)
                let apHtml = "비활성화";
                if (apData?.Points) {
                    apHtml = apData.Points.map(p => {
                        let fName = p.Name.startsWith("진") ? "진화" : p.Name.startsWith("깨") ? "깨달음" : "도약";
                        const r = parseInt((p.Description || "").match(/(\d+)랭크/)?.[1] || 0);
                        let style = r <= 5 ? `color:var(--danger);` : `color:#fff;`;
                        return `<span style="${style}">${fName} ${r}R</span>`;
                    }).join(" / ");
                }

                let agOrder = []; let agChaos = [];
                if (agData?.Slots) {
                    agData.Slots.forEach(s => {
                        let style = s.Point < 14 ? `color:var(--danger);` : `color:#fff;`;
                        const slot = `<div class="ag-slot"><img src="${s.Icon}" class="ag-icon"><span style="${style}; font-weight:800;">${s.Point}P</span></div>`;
                        if (s.Name.includes("혼돈")) agChaos.push(slot); else agOrder.push(slot);
                    });
                }
                const agHtml = `<div class="ag-group">${agOrder.join("")}</div><div class="ag-group">${agChaos.join("")}</div>`;

                // 3. 보석 가치 정밀 계산 (광휘 분별 로직 포함)
                let gemSummary = "없음";
                let totalGemGold = 0;
                if (gData?.Gems) {
                    const gemMap = {};
                    gData.Gems.forEach(g => {
                        const isBind = g.Name.includes("귀속");
                        let type = "";
                        let marketName = g.Name.replace(/\(귀속\)/g, "").trim();

                        if (g.Name.includes("광휘")) {
                            const effectDesc = g.Effects?.[0]?.Description || "";
                            if (effectDesc.includes("피해")) { type = "광휘(겁)"; marketName = marketName.includes("겁화") ? marketName : marketName + " (피해 증가)"; }
                            else if (effectDesc.includes("재사용")) { type = "광휘(작)"; marketName = marketName.includes("작열") ? marketName : marketName + " (재사용 대기시간 감소)"; }
                            else type = "광휘";
                        } else {
                            type = g.Name.includes("겁화") ? "겁화" : g.Name.includes("작열") ? "작열" : "보석";
                        }

                        let bindTag = isBind ? "(귀속)" : "";
                        const key = `${g.Level}레벨 ${type}${bindTag}`;
                        gemMap[key] = (gemMap[key] || 0) + 1;

                        if (!isBind && prices[marketName]) totalGemGold += prices[marketName];
                    });
                    gemSummary = Object.entries(gemMap).sort((a,b) => parseInt(b[0]) - parseInt(a[0])).map(([n, c]) => `${n} ${c}개`).join(", ");
                }

                const row = document.createElement('div');
                row.className = 'list-row';
                if (char.ItemAvgLevel === maxLevelValue) row.classList.add('max-level-row');

                const charId = char.CharacterName.replace(/\s/g, '');
                row.innerHTML = `
                    <div class="char-info"><span class="char-name">${char.CharacterName}</span><span style="font-size:0.75rem; color:#888;">${char.CharacterClassName}</span></div>
                    <div>${char.ServerName}</div>
                    <div class="level">${char.ItemAvgLevel}</div>
                    <div style="font-weight:700;">${cpValue.toLocaleString()}</div>
                    <div id="db-cp-${charId}" style="font-size:0.8rem; color:#aaa;">${cpValue.toLocaleString()}</div>
                    <div class="ap-box">${apHtml}</div>
                    <div class="ag-box">${agHtml}</div>
                    <div class="gem-box">
                        <div class="gem-text">${gemSummary}</div>
                        <span class="gold-text">💰 가치: ${totalGemGold.toLocaleString()} G</span>
                    </div>
                `;
                listContainer.appendChild(row);

                syncCombatPower(char.CharacterName, cpValue).then(res => {
                    const dbEl = document.getElementById(`db-cp-${charId}`);
                    if (res && res.val) {
                        const finalMax = Math.max(cpValue, parseInt(res.val));
                        dbEl.innerText = finalMax.toLocaleString();
                        dbEl.title = `최종 갱신: ${res.time}`;
                    }
                });
            }
        } catch (e) { listContainer.innerHTML = "데이터 로딩 에러"; }
    }
    window.onload = init;
</script>
</body>
</html>
