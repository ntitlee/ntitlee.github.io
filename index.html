<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Final Fix</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4d;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.2; }
        .container { max-width: 1650px; margin: 0 auto; padding: 0 20px; }
        
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; gap: 4px; align-items: center; }
        .tab-btn { padding: 8px 18px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .controls { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .last-update { font-size: 0.75rem; color: #888; }
        .refresh-btn { padding: 6px 15px; font-size: 0.8rem; background: #444; color: #eee; border: none; border-radius: 4px; cursor: pointer; }

        .total-grid { grid-template-columns: 80px 160px 130px 110px 150px 1fr; }
        .member-grid { grid-template-columns: 150px 90px 90px 110px 110px 130px 280px 1fr; }

        .list-header, .list-row { display: grid; gap: 8px; align-items: center; text-align: center; font-size: 0.82rem; }
        .list-header { background: #252525; padding: 10px 8px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 8px; border-bottom: 1px solid var(--border); min-height: 80px; }
        
        .char-name { font-weight: 800; color: #fff; }
        
/* 아크패시브 6R 이하 강조 */
.low-rank { color: var(--danger); font-weight: 900; }

/* 아크그리드 1열(질서), 2열(혼돈) 배치 */
.ark-grid-container { 
    display: flex; 
    flex-direction: column; 
    gap: 6px; 
    width: 100%; 
    align-items: center; 
}

.ark-grid-row { 
    display: flex; 
    gap: 8px;           /* 아이콘 사이 간격 살짝 늘림 */
    justify-content: center; 
    width: 100%; 
}

/* [수정됨] 배경 칸 삭제 버전 */
.grid-item { 
    display: flex; 
    align-items: center; 
    gap: 4px; 
    font-size: 0.75rem; 
    white-space: nowrap; 
    background: none !important; /* 배경색 강제 삭제 */
    padding: 0 !important;      /* 여백 강제 삭제 */
    min-width: 65px;            /* 정렬을 위한 최소 너비 */
}

.grid-item img { 
    width: 20px; 
    height: 20px; 
    border-radius: 2px; 
}

        /* 홈 화면 이미지 */
        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 60vh; flex-direction: column; }
        .image-container { max-width: 700px; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #444; margin-bottom: 20px; }
        .image-container img { width: 100%; height: auto; display: block; }

        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; padding-left: 5px; }
        .gem-text { font-size: 0.72rem; color: #aaa; line-height: 1.3; margin-bottom: 15px; }
        .gold-text { position: absolute; bottom: 0; right: 5px; color: var(--highlight); font-size: 0.85rem; font-weight: 800; }
        
        .loading-dot { color: #555; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="tabMenu" class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
        <button class="tab-btn" onclick="openTab(event, 'nti-total')">통합</button>
    </div>
    <div id="tabContents">
        <div id="welcome-page" class="content">
            <div class="image-container"><img src="welcome.png"></div>
            <h2>LOA NTI Dashboard</h2>
            <p style="color:#888;">상단 메뉴에서 데이터를 확인하세요.</p>
        </div>
        
        <div id="nti-total" class="content" style="display:none;">
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="controls">
                    <span id="time-total" class="last-update"></span>
                    <button class="refresh-btn" onclick="loadNTITotal(true)">새로고침</button>
                </div>
            </div>
            <div class="list-header total-grid"><div>순위</div><div>캐릭터명</div><div>직업</div><div>아이템레벨</div><div>전투력(DB)</div><div>서버</div></div>
            <div id="total-list-container"></div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwGkUNXR8uGB_ouu9qsrDKt7ws6stnmCVA0Hs-sF9xd0fhMwcBtBxeQtGwrPzglUxiLmw/exec";

    let dbData = []; let globalPrices = {};
    function getCurrentTime() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }

    async function syncToSheet(data) {
        try { fetch(SHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); } catch (e) {}
    }

    async function fetchDB() {
        try {
            const res = await fetch(SHEET_API_URL);
            dbData = await res.json();
            document.getElementById('time-total').innerText = `최근 DB 로드: ${getCurrentTime()}`;
        } catch (e) { console.error("DB 로드 실패"); }
    }

    // 보석 시세 동기화
    async function backgroundPriceSync() {
        const levels = [7, 8, 9, 10];
        const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };
        for (const level of levels) {
            for (const type of ["겁화", "작열"]) {
                try {
                    const res = await fetch(`${BASE_URL}/auctions/items`, { method: 'POST', headers, body: JSON.stringify({ "CategoryCode": 210000, "ItemTier": 4, "ItemName": `${level}레벨 ${type}의 보석`, "PageNo": 1, "Sort": "BUY_PRICE" }) });
                    const data = await res.json();
                    if (data.Items?.length > 0) {
                        const best = data.Items.find(i => i.AuctionInfo?.BuyPrice > 0);
                        if (best) globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 100));
            }
        }
    }

    async function loadNTITotal(forceRefresh = false) {
        const container = document.getElementById('total-list-container');
        if (!forceRefresh && dbData.length > 0) { renderTotalList(dbData); return; }

        container.innerHTML = `<div style="padding:30px; text-align:center;" class="loading-dot">데이터 수집 중...</div>`;
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        let allChars = [];

        try {
            for (const owner of Object.values(MEMBERS)) {
                const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(owner)}/siblings`, { headers });
                const sibs = await res.json();
                if (!sibs) continue;
                for (const char of sibs.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1680)) {
                    const pRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers });
                    const pData = await pRes.json();
                    allChars.push({ name: char.CharacterName, job: char.CharacterClassName, lv: parseFloat(char.ItemAvgLevel.replace(/,/g, "")), cp: parseFloat(pData?.CombatPower?.Value || pData?.CombatPower || 0), server: char.ServerName });
                    await new Promise(r => setTimeout(r, 100));
                }
            }
            renderTotalList(allChars);
            document.getElementById('time-total').innerText = `최근 갱신: ${getCurrentTime()}`;
        } catch (e) { container.innerHTML = "갱신 오류"; }
    }

    function renderTotalList(data) {
        const container = document.getElementById('total-list-container');
        data.sort((a, b) => (parseFloat(b.lv || b["아이템레벨"])) - (parseFloat(a.lv || a["아이템레벨"])));
        container.innerHTML = data.map((c, i) => {
            const rank = i + 1;
            const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
            return `<div class="list-row total-grid"><div>${rankIcon}</div><div class="char-name">${c.name||c["캐릭터명"]}</div><div>${c.job||c["직업"]}</div><div>${parseFloat(c.lv||c["아이템레벨"]).toFixed(2)}</div><div style="font-weight:bold;">${parseFloat(c.cp||c["전투력"]).toLocaleString()}</div><div>${c.server||c["서버"]}</div></div>`;
        }).join("");
    }

// loadFullDetails 함수 내부의 syncToSheet 호출 부분 수정
async function loadFullDetails(charName, charId, ownerName, charData) {
    // ... (기존 API 호출 및 데이터 가공 로직 동일) ...

    // 아크패시브 텍스트 가공 (HTML 태그 없이 순수 텍스트로 저장 권장)
    const apSaveText = apData?.Points ? apData.Points.map(p => {
        const m = (p.Description||"").match(/(\d+)랭크\s+(\d+)레벨/);
        return m ? `${p.Name}: ${m[1]}랭크 ${m[2]}레벨` : "";
    }).filter(v => v).join(" / ") : "Inactive";

    // 아크그리드 포인트 요약 (예: 100/100/100/100/100/100)
    const agSaveText = agData?.Slots ? agData.Slots.map(s => s.Point).join("/") : "Inactive";

    // 시트로 통합 데이터 전송
    syncToSheet({ 
        type: "update_all", // 타입을 update_all로 변경
        name: charName, 
        job: charData.CharacterClassName, 
        lv: charData.ItemAvgLevel, 
        cp: cp, 
        server: charData.ServerName, 
        owner: ownerName,
        arkPassive: apSaveText,   // 추가
        arkGrid: agSaveText,      // 추가
        gemSummary: gemTxt.innerText, // 이미 가공된 보석 텍스트 사용
        gemTotal: charTotalGold       // 숫자 값
    });
}
    
// 아크패시브 상세 표기 및 6R 이하 빨간 볼드 적용
document.getElementById(`ap-${charId}`).innerHTML = apData?.Points && apData.Points.length > 0 ? apData.Points.map(p => {
    const name = p.Name; // "진화", "깨달음", "도약"
    const desc = p.Description || "";
    const m = desc.match(/(\d+)랭크\s+(\d+)레벨/);
    
    if (m) {
        const rankNum = parseInt(m[1]);
        const levelNum = parseInt(m[2]);
        // [수정] 유저님이 원하시는 상세 포맷: "진화: 6랭크 0레벨"
        const fullText = `${name}: ${rankNum}랭크 ${levelNum}레벨`;
        
        // 6랭크 이하일 경우 기존에 정의한 'low-rank' 클래스 적용
        const className = rankNum < 6 ? 'low-rank' : '';
        return `<span>${name}: </span><span class="${className}">${rankNum}랭크 ${levelNum}레벨</span>`;
    }
    return ""; // 데이터 매칭 안될 경우 빈값
}).join("<br>") : "Inactive";

            // 아크그리드 질서(1-3) vs 혼돈(4-6) 분리
            // 아크그리드 질서(1-3) vs 혼돈(4-6) 분리 (배경 없는 깔끔한 버전)
const agEl = document.getElementById(`ag-${charId}`);
if (agData?.Slots && agData.Slots.length > 0) {
    const row1 = agData.Slots.slice(0, 3);
    const row2 = agData.Slots.slice(3, 6);
    
    agEl.innerHTML = `
        <div class="ark-grid-container">
            <div class="ark-grid-row">
                ${row1.map(s => `<div class="grid-item"><img src="${s.Icon}"><span>${s.Point}p</span></div>`).join("")}
            </div>
            <div class="ark-grid-row">
                ${row2.map(s => `<div class="grid-item"><img src="${s.Icon}"><span>${s.Point}p</span></div>`).join("")}
            </div>
        </div>`;
} else { 
    agEl.innerText = "Inactive"; 
}

            // 보석 골드 계산 복구
            const gemTxt = document.getElementById(`gem-txt-${charId}`);
            const gemGold = document.getElementById(`gem-gold-${charId}`);
            if (gData?.Gems) {
                let counts = {}; let charTotalGold = 0;
                gData.Gems.forEach(g => {
                    const name = g.Name.replace(/<[^>]*>?/gm, '').replace(/의 보석/g, "").trim();
                    const isBind = name.includes("귀속") || name.includes("이벤트");
                    const cleanName = name.replace(/\(귀속\)|\(이벤트\)/g, "").trim();
                    if (!isBind) { charTotalGold += globalPrices[cleanName.includes("광휘") ? cleanName.replace("광휘", "작열") : cleanName] || 0; }
                    let label = isBind ? cleanName + "(귀)" : cleanName;
                    counts[label] = (counts[label] || 0) + 1;
                });
                gemTxt.innerText = Object.entries(counts).map(([k,v]) => `${k} ${v}`).join(", ");
                gemGold.innerText = charTotalGold.toLocaleString() + " G";
                
                const totalEl = document.getElementById(`total-gold-${ownerName}`);
                let current = parseInt(totalEl.dataset.sum || 0);
                totalEl.dataset.sum = current + charTotalGold;
                totalEl.innerText = `총 합계: ${parseInt(totalEl.dataset.sum).toLocaleString()} G`;
            } else { gemTxt.innerText = "No Gems"; }

            document.querySelectorAll(`#cp-${charId}, #ap-${charId}, #ag-${charId}`).forEach(el => el.classList.remove('loading-dot'));
        } catch (e) {}
    }

    async function handleMemberTab(name, forceRefresh = false) {
        const listContainer = document.getElementById(`list-${name}`);
        const totalGold = document.getElementById(`total-gold-${name}`);
        if (!forceRefresh && listContainer.dataset.loaded === "true") return;

        listContainer.innerHTML = "";
        listContainer.dataset.loaded = "true";
        totalGold.dataset.sum = "0";
        totalGold.innerText = "총 합계: 0 G";

        const headers = { "accept": "application/json", "Authorization": API_KEY };
        const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, { headers });
        const targets = (await res.json()).filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640).sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

        targets.forEach(char => {
            const charId = (name + char.CharacterName).replace(/\s/g, '');
            const row = document.createElement('div'); row.className = 'list-row member-grid';
            row.innerHTML = `<div><span class="char-name">${char.CharacterName}</span></div><div>${char.ServerName}</div><div style="font-weight:800;">${char.ItemAvgLevel}</div><div id="cp-${charId}" class="loading-dot">...</div><div id="db-cp-${charId}">...</div><div id="ap-${charId}" class="loading-dot">...</div><div id="ag-${charId}" class="loading-dot">...</div><div class="gem-box"><div id="gem-txt-${charId}" class="gem-text">로딩 중...</div><div id="gem-gold-${charId}" class="gold-text">0 G</div></div>`;
            listContainer.appendChild(row);
            loadFullDetails(char.CharacterName, charId, name, char);
        });
        document.getElementById(`time-${name}`).innerText = `최근 갱신: ${getCurrentTime()}`;
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (tabName === 'nti-total') loadNTITotal();
        else if (MEMBERS[tabName]) handleMemberTab(tabName, false);
    }

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";
            content.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:10px;"><div class="controls"><span id="time-${name}" class="last-update"></span><button class="refresh-btn" onclick="handleMemberTab('${name}', true)">새로고침</button></div></div><div class="list-header member-grid"><div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력</div><div>아크패시브</div><div>아크그리드</div><div style="display:flex; justify-content:space-between;"><span>보석 현황</span><span id="total-gold-${name}" style="color:var(--highlight); font-size:0.75rem;">총 합계: 0 G</span></div></div><div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    window.onload = async () => { 
        await fetchDB(); 
        await backgroundPriceSync(); 
        init(); 
    };
</script>
</body>
</html>
