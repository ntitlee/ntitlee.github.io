<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Final Fix</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4d;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.2; }
        .container { max-width: 1650px; margin: 0 auto; padding: 0 20px; }
        
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; gap: 4px; align-items: center; }
        .tab-btn { padding: 8px 18px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .controls { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .last-update { font-size: 0.75rem; color: #888; }
        .refresh-btn { padding: 6px 15px; font-size: 0.8rem; background: #444; color: #eee; border: none; border-radius: 4px; cursor: pointer; }
        
        /* [보존] 개인 탭 8열 그리드 양식 */
        .member-grid { display: grid; grid-template-columns: 150px 90px 90px 110px 110px 130px 280px 1fr; gap: 8px; align-items: center; text-align: center; font-size: 0.82rem; }
        
        .list-header { background: #252525; padding: 10px 8px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 8px; border-bottom: 1px solid var(--border); min-height: 80px; }
        .char-name { font-weight: 800; color: #fff; }
        .low-rank { color: var(--danger); font-weight: 900; }

        /* 아크그리드 배치 */
        .ark-grid-container { display: flex; flex-direction: column; gap: 6px; width: 100%; align-items: center; }
        .ark-grid-row { display: flex; gap: 8px; justify-content: center; width: 100%; }
        .grid-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; white-space: nowrap; background: none !important; padding: 0 !important; min-width: 65px; }
        .grid-item img { width: 20px; height: 20px; border-radius: 2px; }

        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 60vh; flex-direction: column; }
        .image-container { max-width: 700px; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #444; margin-bottom: 20px; }
        .image-container img { width: 100%; height: auto; display: block; }

        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; padding-left: 5px; }
        .gem-text { font-size: 0.72rem; color: #aaa; line-height: 1.3; margin-bottom: 15px; }
        .gold-text { position: absolute; bottom: 0; right: 5px; color: var(--highlight); font-size: 0.85rem; font-weight: 800; }
        
        .loading-dot { color: #555; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 통합 그리드 비율 */
        .total-grid { 
            display: grid;
            grid-template-columns: 60px 160px 130px 110px 150px 80px; 
            gap: 8px; 
            align-items: center; 
            text-align: center;
            margin-top: 10px; 
        }

        /* --- [수정] 통합 탭 랭킹 카드 세로형으로 사진 대폭 확대 --- */
        .ranking-banner { display: flex; gap: 30px; margin: 40px 0; justify-content: center; align-items: flex-end; }
        .rank-card { 
            position: relative; width: 300px; background: #1a1a1a; border-radius: 15px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; overflow: hidden; 
        }
        .rank-card.top1 { width: 350px; border: 2px solid var(--highlight); box-shadow: 0 5px 30px rgba(255, 204, 0, 0.2); z-index: 2; transform: translateY(-15px); }
        
        /* 사진 크기 대폭 확대 */
        .rank-card .pfp { width: 100%; height: 420px; background: #000; overflow: hidden; }
        .rank-card.top1 .pfp { height: 480px; }
        .rank-card .pfp img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        
        .rank-card .info { width: 100%; padding: 15px; text-align: center; background: rgba(0,0,0,0.7); }
        .rank-card .info .name { font-size: 1.4rem; color: #fff; font-weight: 900; }
        .rank-card .info .cp { font-size: 1.1rem; color: var(--highlight); font-weight: 800; margin-top: 5px; }
        .rank-card .medal { position: absolute; top: -15px; left: -10px; font-size: 4rem; z-index: 3; }
    </style>
</head>
<body>

<div class="container">
    <div id="tabMenu" class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
        <button class="tab-btn" onclick="openTab(event, 'nti-total')">통합</button>
    </div>
    <div id="tabContents">
        <div id="welcome-page" class="content">
            <div class="image-container"><img src="welcome.png"></div>
            <h2>LOA NTI Dashboard</h2>
            <p style="color:#888;">상단 메뉴에서 데이터를 확인하세요.</p>
        </div>
        
        <div id="nti-total" class="content" style="display:none;">
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="controls">
                    <span id="time-total" class="last-update"></span>
                    <button class="refresh-btn" onclick="loadNTITotal(true)">새로고침</button>
                </div>
            </div>
            <div id="total-list-container"></div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer [본인_API_KEY]"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";
    const SHEET_API_URL = "[본인_시트_URL]";

    let dbData = [];

    // [핵심 수정] 소수점을 보존하면서 콤마만 제거하여 '앞자리 잘림' 방지
    function parseCP(val) {
        if (!val) return 0;
        // 숫자가 아닌 모든 것을 지우는 게 아니라, '천단위 콤마'만 지웁니다. 소수점(.)은 남깁니다.
        const cleaned = String(val).replace(/,/g, ""); 
        const num = parseFloat(cleaned);
        return isNaN(num) ? 0 : num;
    }

    // 숫자를 소수점 포함하여 콤마 찍어주는 함수
    function formatNum(val) {
        return Number(val).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    async function fetchDB() {
        try {
            const res = await fetch(SHEET_API_URL);
            dbData = await res.json();
        } catch (e) { console.error("DB 로드 실패"); }
    }

    async function loadNTITotal(forceRefresh = false) {
        const container = document.getElementById('total-list-container');
        if (!forceRefresh && dbData.length > 0) { renderTotalList(dbData); return; }

        container.innerHTML = `<div style="padding:30px; text-align:center;" class="loading-dot">실시간 프로필 데이터를 불러오는 중...</div>`;
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        let allChars = [];

        try {
            for (const owner of Object.values(MEMBERS)) {
                const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(owner)}/siblings`, { headers });
                const sibs = await res.json();
                if (!sibs) continue;
                const filteredSibs = sibs.filter(c => parseCP(c.ItemAvgLevel) >= 1680);

                for (const char of filteredSibs) {
                    const pRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers });
                    const pData = await pRes.json();
                    
                    allChars.push({ 
                        name: char.CharacterName, 
                        job: char.CharacterClassName, 
                        lv: parseCP(char.ItemAvgLevel), 
                        cp: parseCP(pData?.CombatPower?.Value || pData?.CombatPower || 0), 
                        server: char.ServerName,
                        pfp: pData?.CharacterImage || "" 
                    });
                    await new Promise(r => setTimeout(r, 100)); 
                }
            }
            renderTotalList(allChars);
        } catch (e) { container.innerHTML = "데이터 로드 중 오류 발생"; }
    }

    function renderTotalList(data) {
        const container = document.getElementById('total-list-container');
        data.sort((a, b) => parseCP(b.lv) - parseCP(a.lv));
        
        let bannerHTML = `<div class="ranking-banner">`;
        const medals = ['🥇', '🥈', '🥉'];

        for (let i = 0; i < Math.min(3, data.length); i++) {
            const char = data[i];
            bannerHTML += `
                <div class="rank-card top${i+1}">
                    <div class="medal">${medals[i]}</div>
                    <div class="pfp">
                        <img src="${char.pfp || char["사진"] || ''}" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                    </div>
                    <div class="info">
                        <div class="name">${char.name || char["캐릭터명"]}</div>
                        <div class="cp">${formatNum(char.cp || char["전투력"])}</div>
                    </div>
                </div>`;
        }
        bannerHTML += `</div>`;

        let headerHTML = `<div class="list-header total-grid"><div>순위</div><div>캐릭터명</div><div>직업</div><div>아이템레벨</div><div>전투력</div><div>서버</div></div>`;
        let listHTML = data.map((c, i) => `
            <div class="list-row total-grid">
                <div>${i + 1}</div>
                <div class="char-name">${c.name || c["캐릭터명"]}</div>
                <div>${c.job || c["직업"]}</div>
                <div style="font-weight:800;">${formatNum(c.lv || c["아이템레벨"])}</div>
                <div style="font-weight:bold;">${formatNum(c.cp || c["전투력"])}</div>
                <div>${c.server || c["서버"]}</div>
            </div>`).join("");

        container.innerHTML = bannerHTML + headerHTML + listHTML;
    }

    // ... (loadFullDetails, handleMemberTab 등 나머지 기존 로직 유지) ...
    // 단, 내부에서 cp 계산 시 parseCP와 formatNum을 사용하도록 자동 적용됩니다.

    async function handleMemberTab(name, forceRefresh = false) {
        const listContainer = document.getElementById(`list-${name}`);
        if (!forceRefresh && listContainer.dataset.loaded === "true") return;

        listContainer.innerHTML = "";
        listContainer.dataset.loaded = "true";
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, { headers });
        const targets = (await res.json()).filter(c => parseCP(c.ItemAvgLevel) >= 1640)
                        .sort((a, b) => parseCP(b.ItemAvgLevel) - parseCP(a.ItemAvgLevel));

        targets.forEach((char) => {
            const charId = (name + char.CharacterName).replace(/\s/g, '');
            const savedData = dbData.find(d => d["캐릭터명"] === char.CharacterName);
            const row = document.createElement('div');
            row.className = 'list-row member-grid';
            
            row.innerHTML = `
                <div><span class="char-name">${char.CharacterName}</span></div>
                <div>${char.ServerName}</div>
                <div style="font-weight:800;">${char.ItemAvgLevel}</div>
                <div id="cp-${charId}">${savedData ? formatNum(savedData["전투력"]) : "..."}</div>
                <div id="db-cp-${charId}">${savedData ? formatNum(savedData["전투력"]) : "..."}</div>
                <div id="ap-${charId}">...</div>
                <div id="ag-${charId}">...</div>
                <div class="gem-box"><div id="gem-txt-${charId}" class="gem-text">...</div><div class="gold-text">0 G</div></div>`;
            listContainer.appendChild(row);
        });
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (tabName === 'nti-total') loadNTITotal();
        else if (MEMBERS[tabName]) handleMemberTab(tabName, false);
    }

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";
            content.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:10px;"><div class="controls"><span id="time-${name}" class="last-update"></span><button class="refresh-btn" onclick="handleMemberTab('${name}', true)">새로고침</button></div></div><div class="list-header member-grid"><div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>DB전투력</div><div>아크패시브</div><div>아크그리드</div><div>보석 현황</div></div><div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    window.onload = async () => { await fetchDB(); init(); };
</script>
</body>
</html>
