<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1850px; margin: 0 auto; }
        
        /* 상단 탭 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 리스트 그리드 설정 */
        .total-grid { grid-template-columns: 120px 200px 150px 140px 180px 1fr; }
        .member-grid { grid-template-columns: 180px 100px 100px 140px 180px 240px 250px 1fr; }

        .list-header, .list-row { display: grid; gap: 12px; align-items: center; text-align: center; font-size: 0.85rem; }
        .list-header { background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 15px 12px; border-bottom: 1px solid var(--border); min-height: 85px; position: relative; }
        
        /* 순위별 테두리 스타일 */
        .rank-1 { border: 2px solid var(--gold) !important; box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.15); }
        .rank-2 { border: 2px solid var(--silver) !important; }
        .rank-3 { border: 2px solid var(--bronze) !important; }

        /* 티어별 배경색 */
        .row-1750 { background-color: #4c2626 !important; }
        .row-1730 { background-color: #4c3a26 !important; }
        .row-1720 { background-color: #4c4626 !important; }
        .row-1710 { background-color: #263c26 !important; }
        .row-1700 { background-color: #26364c !important; }

        /* 캐릭터 이름 강조 */
        .char-name { font-weight: 800; color: #fff; font-size: 1rem; }

        /* 홈 화면 */
        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .image-container { max-width: 850px; width: 100%; border-radius: 24px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid #444; }
        .image-container img { width: 100%; height: auto; display: block; }

        /* 보석 박스 */
        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; }
        .gem-text { font-size: 0.78rem; color: #aaa; line-height: 1.4; padding-bottom: 15px; }
        .gold-text { position: absolute; bottom: -5px; right: 0; color: var(--highlight); font-size: 0.95rem; font-weight: 800; }
        
        .loading-dot { color: #555; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="tabMenu" class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
        <button class="tab-btn" onclick="openTab(event, 'nti-total')">통합</button>
    </div>
    
    <div id="tabContents">
        <div id="welcome-page" class="content">
            <div class="image-container">
                <img src="welcome.png" alt="Welcome NTI">
            </div>
        </div>

        <div id="nti-total" class="content" style="display:none;">
            <div class="list-header total-grid">
                <div>순위/등급</div><div>캐릭터명</div><div>직업</div><div>아이템레벨</div><div>전투력(최대)</div><div>서버</div>
            </div>
            <div id="total-list-container"></div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    let globalPrices = {}; let priceStatus = "pending"; 
    function stripHtml(html) { return html ? html.replace(/<[^>]*>?/gm, '').trim() : ""; }

    async function backgroundPriceSync() {
        if (priceStatus !== "pending") return;
        priceStatus = "loading";
        const levels = [7, 8, 9, 10];
        const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };
        for (const level of levels) {
            for (const type of ["겁화", "작열"]) {
                try {
                    const res = await fetch(`${BASE_URL}/auctions/items`, {
                        method: 'POST', headers,
                        body: JSON.stringify({ "CategoryCode": 210000, "ItemTier": 4, "ItemName": `${level}레벨 ${type}의 보석`, "PageNo": 1, "Sort": "BUY_PRICE" })
                    });
                    const data = await res.json();
                    if (data.Items?.length > 0) {
                        const best = data.Items.find(i => i.AuctionInfo?.BuyPrice > 0);
                        if (best) globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 150));
            }
        }
        priceStatus = "done";
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
        if (tabName === 'nti-total') loadNTITotal();
    }

    // 통합 탭: 최대 전투력 기준 정렬
    async function loadNTITotal() {
        const container = document.getElementById('total-list-container');
        if (container.dataset.loaded === "true") return;
        container.innerHTML = `<div style="padding:50px; text-align:center;" class="loading-dot">전체 인원 최대 전투력 집계 중...</div>`;

        const headers = { "accept": "application/json", "Authorization": API_KEY };
        let allChars = [];

        try {
            for (const owner of Object.values(MEMBERS)) {
                const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(owner)}/siblings`, { headers });
                const sibs = await res.json();
                if (!sibs) continue;

                const filtered = sibs.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1680);
                for (const char of filtered) {
                    const pRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers });
                    const pData = await pRes.json();
                    const lv = parseFloat(char.ItemAvgLevel.replace(/,/g, ""));
                    
                    // 최대 전투력 정밀 추출 (소수점 포함)
                    let rawCP = pData?.CombatPower?.Value || pData?.CombatPower || 0;
                    let cp = parseFloat(String(rawCP).replace(/,/g, ""));
                    if (isNaN(cp)) cp = 0;
                    
                    let tier = lv >= 1750 ? "1750" : lv >= 1730 ? "1730" : lv >= 1720 ? "1720" : lv >= 1710 ? "1710" : lv >= 1700 ? "1700" : "1680";
                    allChars.push({ tier, name: char.CharacterName, job: char.CharacterClassName, lv, cp, server: char.ServerName });
                    await new Promise(r => setTimeout(r, 80));
                }
            }
            
            // 전투력(최대) 내림차순 정렬
            allChars.sort((a, b) => b.cp - a.cp);

            container.innerHTML = allChars.map((c, i) => {
                const rank = i + 1;
                let rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
                let medal = rank === 1 ? '🥇 ' : rank === 2 ? '🥈 ' : rank === 3 ? '🥉 ' : '';
                
                return `
                    <div class="list-row total-grid row-${c.tier} ${rankClass}">
                        <div style="font-weight:bold;">${medal}${c.tier}</div>
                        <div style="font-weight:bold; font-size:1rem;">${c.name}</div>
                        <div>${c.job}</div>
                        <div>${c.lv.toFixed(2)}</div>
                        <div style="font-weight:bold; color:#fff;">${c.cp.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div>${c.server}</div>
                    </div>
                `;
            }).join("");
            container.dataset.loaded = "true";
        } catch (e) { container.innerHTML = "데이터 로딩 오류"; }
    }

    // 멤버별 상세 정보 로드
    async function loadFullDetails(charName, charId) {
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        try {
            const [pRes, apRes, agRes, gRes] = await Promise.all([
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkpassive`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkgrid`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/gems`, { headers })
            ]);

            const pData = await pRes.json();
            const apData = await apRes.json();
            const agData = await agRes.json();
            const gData = await gRes.json();

            let rawCP = pData?.CombatPower?.Value || pData?.CombatPower || 0;
            let cp = parseFloat(String(rawCP).replace(/,/g, ""));
            const formattedCP = cp.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            document.getElementById(`cp-${charId}`).innerText = formattedCP;
            document.getElementById(`db-cp-${charId}`).innerText = formattedCP;

            const apEl = document.getElementById(`ap-${charId}`);
            if (apData?.Points) {
                apEl.innerHTML = apData.Points.map(p => `${stripHtml(p.Name).substring(0,2)} ${parseInt((p.Description||"").match(/(\d+)랭크/)?.[1]||0)}R`).join(" / ");
            } else { apEl.innerText = "Inactive"; }

            const agEl = document.getElementById(`ag-${charId}`);
            if (agData?.Slots) {
                agEl.innerHTML = agData.Slots.map(s => `<span style="margin-right:5px;">${s.Point}P</span>`).join("");
            } else { agEl.innerText = "Inactive"; }

            const updateGems = () => {
                if (!gData?.Gems) { document.getElementById(`gem-txt-${charId}`).innerText = "No Gems"; return; }
                let totalGold = 0; let counts = {};
                gData.Gems.forEach(g => {
                    const name = stripHtml(g.Name);
                    const isBind = name.includes("귀속") || name.includes("이벤트");
                    const clean = name.replace(/의 보석|\(귀속\)|\(이벤트\)/g, "").trim();
                    if (!isBind) {
                        let key = clean.includes("광휘") ? clean.replace("광휘", "작열") : clean;
                        totalGold += globalPrices[key] || 0;
                    }
                    let label = isBind ? clean + "(귀속)" : clean;
                    counts[label] = (counts[label] || 0) + 1;
                });
                document.getElementById(`gem-txt-${charId}`).innerText = Object.entries(counts).map(([k,v]) => `${k} ${v}개`).join(", ");
                document.getElementById(`gem-gold-${charId}`).innerText = totalGold.toLocaleString() + " G";
                if (totalGold === 0 && priceStatus !== "done") setTimeout(updateGems, 2000);
            };
            updateGems();
            document.querySelectorAll(`#cp-${charId}, #ap-${charId}, #ag-${charId}`).forEach(el => el.classList.remove('loading-dot'));
        } catch (e) {}
    }

    async function handleMemberTab(name) {
        const listContainer = document.getElementById(`list-${name}`);
        if (listContainer.innerHTML !== "") return;
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, { headers });
        const sibs = await res.json();
        const targets = sibs.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                            .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

        targets.forEach(char => {
            const charId = (name + char.CharacterName).replace(/\s/g, '');
            const row = document.createElement('div');
            row.className = 'list-row member-grid';
            row.innerHTML = `
                <div><span class="char-name">${char.CharacterName}</span></div>
                <div>${char.ServerName}</div><div style="font-weight:800;">${char.ItemAvgLevel}</div>
                <div id="cp-${charId}" class="loading-dot">...</div><div id="db-cp-${charId}">...</div>
                <div id="ap-${charId}" class="loading-dot">...</div><div id="ag-${charId}" class="loading-dot">...</div>
                <div class="gem-box">
                    <div id="gem-txt-${charId}" class="gem-text">로딩 중...</div>
                    <div id="gem-gold-${charId}" class="gold-text">0 G</div>
                </div>`;
            listContainer.appendChild(row);
            loadFullDetails(char.CharacterName, charId);
        });
    }

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => { openTab(e, name); handleMemberTab(name); };
            menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";
            content.innerHTML = `<div class="list-header member-grid"><div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력</div><div>패시브</div><div>그리드</div><div>보석 현황</div></div><div id="list-${name}"></div>`;
            container.appendChild(content);
        });
        backgroundPriceSync();
    }
    window.onload = init;
</script>
</body>
</html>
