<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard - Welcome & Gem Final</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4f;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1850px; margin: 0 auto; }
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .list-header, .list-row { display: grid; grid-template-columns: 180px 100px 100px 140px 180px 240px 250px 1fr; gap: 12px; align-items: center; text-align: center; font-size: 0.85rem; }
        .list-header { background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 15px 12px; border-bottom: 1px solid var(--border); min-height: 95px; border: 2px solid transparent; position: relative; }
        
        .max-level-row { border: 2px solid var(--highlight) !important; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .char-name { font-weight: 800; color: #fff; font-size: 1rem; }
        
        /* 메인페이지(Welcome) 전용 스타일 */
        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 70vh; flex-direction: column; }
        .welcome-card { background: var(--card-bg); border-radius: 24px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); max-width: 700px; width: 100%; text-align: center; }
        .image-container { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 30px; border: 2px solid #444; }
        .image-container img { width: 100%; height: auto; display: block; }
        .welcome-text h1 { font-size: 2.2rem; margin-bottom: 10px; color: #fff; }
        .welcome-text p { color: #aaa; margin: 5px 0; }
        
        /* 로딩 애니메이션 및 보석 박스 */
        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; }
        .gem-text { font-size: 0.78rem; color: #aaa; line-height: 1.4; padding-bottom: 15px; }
        .gold-text { position: absolute; bottom: -5px; right: 0; color: var(--highlight); font-size: 0.95rem; font-weight: 800; }
        .loading-dot { color: #555; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #fff; margin-bottom: 25px;">📊 LOA NTI Dashboard</h1>
    <div id="tabMenu" class="tabs">
        <button id="btn-home" class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
    </div>
    
    <div id="tabContents">
        <div id="welcome-page" class="content">
            <div class="welcome-card">
                <div class="image-container">
                    <img src="https://drive.google.com/uc?export=view&id=1BKQHCDzOOzmlKPyVwaSO5PwRBXvI3rrQ" alt="Welcome NTI">
                </div>
                <div class="welcome-text">
                    <h1>WELCOME TO <span style="color:var(--primary)">LOA NTI</span></h1>
                    <p>말랑말랑한 동료들과 함께하는 캐릭터 관리 대시보드</p>
                    <p style="font-size: 0.9rem; color: #666; margin-top: 20px;">상단의 캐릭터 이름을 클릭하여 상세 정보를 확인하세요.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    let globalPrices = {}; 
    let priceStatus = "pending"; 

    function stripHtml(html) { return html ? html.replace(/<[^>]*>?/gm, '').trim() : ""; }

    async function backgroundPriceSync() {
        if (priceStatus !== "pending") return;
        priceStatus = "loading";
        const levels = [7, 8, 9, 10];
        const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };
        for (const level of levels) {
            for (const type of ["겁화", "작열"]) {
                try {
                    const res = await fetch(`${BASE_URL}/auctions/items`, {
                        method: 'POST', headers,
                        body: JSON.stringify({ "CategoryCode": 210000, "ItemTier": 4, "ItemName": `${level}레벨 ${type}의 보석`, "PageNo": 1, "Sort": "BUY_PRICE" })
                    });
                    const data = await res.json();
                    if (data.Items?.length > 0) {
                        const best = data.Items.find(i => i.AuctionInfo?.BuyPrice > 0);
                        if (best) globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 150));
            }
        }
        priceStatus = "done";
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");

        if (tabName === 'welcome-page') return;

        const listContainer = document.getElementById(`list-${tabName}`);
        if (listContainer.innerHTML !== "") return;

        const headers = { "accept": "application/json", "Authorization": API_KEY };
        const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[tabName])}/siblings`, { headers });
        const siblings = await sibRes.json();
        
        const targets = siblings.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

        listContainer.innerHTML = "";
        targets.forEach(char => {
            const charId = (tabName + char.CharacterName).replace(/\s/g, '');
            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div><span class="char-name">${char.CharacterName}</span></div>
                <div>${char.ServerName}</div><div style="font-weight:800;">${char.ItemAvgLevel}</div>
                <div id="cp-${charId}" class="loading-dot">...</div>
                <div class="db-cp-container"><span id="db-cp-${charId}">...</span></div>
                <div id="ap-${charId}" class="loading-dot">...</div>
                <div id="ag-${charId}" class="loading-dot">...</div>
                <div class="gem-box">
                    <div id="gem-txt-${charId}" class="gem-text">로딩 중...</div>
                    <div id="gem-gold-${charId}" class="gold-text">0 G</div>
                </div>
            `;
            listContainer.appendChild(row);
            loadFullDetails(char.CharacterName, charId);
        });
    }

    async function loadFullDetails(charName, charId) {
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        try {
            const [pRes, apRes, agRes, gRes] = await Promise.all([
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkpassive`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkgrid`, { headers }),
                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/gems`, { headers })
            ]);

            const pData = await pRes.json();
            const apData = await apRes.json();
            const agData = await agRes.json();
            const gData = await gRes.json();

            document.getElementById(`cp-${charId}`).innerText = parseInt(pData?.CombatPower || 0).toLocaleString();
            document.getElementById(`db-cp-${charId}`).innerText = parseInt(pData?.CombatPower || 0).toLocaleString();

            const apEl = document.getElementById(`ap-${charId}`);
            if (apData?.Points) {
                apEl.innerHTML = apData.Points.map(p => `${stripHtml(p.Name).substring(0,2)} ${parseInt((p.Description||"").match(/(\d+)랭크/)?.[1]||0)}R`).join(" / ");
            } else { apEl.innerText = "Inactive"; }

            const agEl = document.getElementById(`ag-${charId}`);
            if (agData?.Slots) {
                agEl.innerHTML = agData.Slots.map(s => `<div style="display:inline-block; margin-right:5px;">${s.Point}P</div>`).join("");
            } else { agEl.innerText = "Inactive"; }

            const updateGems = () => {
                if (!gData?.Gems) { document.getElementById(`gem-txt-${charId}`).innerText = "No Gems"; return; }
                let totalGold = 0; let counts = {};
                gData.Gems.forEach(g => {
                    const name = stripHtml(g.Name);
                    const isBind = name.includes("귀속");
                    const clean = name.replace(/의 보석|\(귀속\)/g, "").trim();
                    if (!isBind) {
                        let key = clean.includes("광휘") ? clean.replace("광휘", "작열") : clean;
                        totalGold += globalPrices[key] || 0;
                    }
                    let label = isBind ? clean + "(귀속)" : clean;
                    counts[label] = (counts[label] || 0) + 1;
                });
                document.getElementById(`gem-txt-${charId}`).innerText = Object.entries(counts).map(([k,v]) => `${k} ${v}개`).join(", ");
                document.getElementById(`gem-gold-${charId}`).innerText = totalGold.toLocaleString() + " G";
                if (totalGold === 0 && priceStatus !== "done") setTimeout(updateGems, 2000);
            };
            updateGems();
        } catch (e) {}
    }

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
            btn.onclick = (e) => openTab(e, name); menu.appendChild(btn);
            const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";
            content.innerHTML = `<div class="list-header"><div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력</div><div>패시브</div><div>그리드</div><div>보석 현황</div></div><div id="list-${name}"></div>`;
            container.appendChild(content);
        });
        backgroundPriceSync();
    }
    window.onload = init;
</script>
</body>
</html>
