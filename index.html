<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>LOA NTI Dashboard - Final Fix</title>

    <style>

        :root { 

            --bg: #121212; --card-bg: #1e1e1e; --border: #333;

            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4d;

        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.2; }

        .container { max-width: 1650px; margin: 0 auto; padding: 0 20px; }

        

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; gap: 4px; align-items: center; }

        .tab-btn { padding: 8px 18px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }

        .tab-btn.active { background: var(--primary); color: white; }



        .controls { margin-left: auto; display: flex; align-items: center; gap: 15px; }

        .last-update { font-size: 0.75rem; color: #888; }

        .refresh-btn { padding: 6px 15px; font-size: 0.8rem; background: #444; color: #eee; border: none; border-radius: 4px; cursor: pointer; }

        .member-grid { grid-template-columns: 150px 90px 90px 110px 110px 130px 280px 1fr; }

        .list-header, .list-row { display: grid; gap: 8px; align-items: center; text-align: center; font-size: 0.82rem; }

        .list-header { background: #252525; padding: 10px 8px; font-weight: 800; border-bottom: 2px solid var(--border); }

        .list-row { background: var(--card-bg); padding: 8px; border-bottom: 1px solid var(--border); min-height: 80px; }

        

        .char-name { font-weight: 800; color: #fff; }

        

        /* 아크패시브 6R 이하 강조 */

        .low-rank { color: var(--danger); font-weight: 900; }



        /* 아크그리드 배치 */

        .ark-grid-container { display: flex; flex-direction: column; gap: 6px; width: 100%; align-items: center; }

        .ark-grid-row { display: flex; gap: 8px; justify-content: center; width: 100%; }

        .grid-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; white-space: nowrap; background: none !important; padding: 0 !important; min-width: 65px; }

        .grid-item img { width: 20px; height: 20px; border-radius: 2px; }



        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 60vh; flex-direction: column; }

        .image-container { max-width: 700px; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #444; margin-bottom: 20px; }

        .image-container img { width: 100%; height: auto; display: block; }



        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; padding-left: 5px; }

        .gem-text { font-size: 0.72rem; color: #aaa; line-height: 1.3; margin-bottom: 15px; }

        .gold-text { position: absolute; bottom: 0; right: 5px; color: var(--highlight); font-size: 0.85rem; font-weight: 800; }

        

        .loading-dot { color: #555; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }



    /* 통합 그리드 비율 */

.total-grid { 

    display: grid;

    grid-template-columns: 60px 160px 130px 110px 150px 80px; 

    gap: 8px; 

    align-items: center; 

    text-align: center;

    margin-top: 10px; 

}



/* --- 랭킹 프로필 카드 스타일 --- */

.ranking-banner { 

    display: flex; 

    gap: 30px; 

    margin: 40px 0; 

    justify-content: center; 

    align-items: flex-end; 

}



.rank-card { 

    position: relative; 

    width: 320px; 

    height: 140px; 

    background: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);

    border-radius: 16px; 

    border: 1px solid var(--border);

    display: flex;

    align-items: center;

    padding: 15px;

    box-sizing: border-box;

}



.rank-card.top1 { 

    width: 360px; height: 160px; 

    border: 2px solid var(--highlight); 

    box-shadow: 0 0 25px rgba(255, 204, 0, 0.2);

    z-index: 2;

}



.rank-card .pfp { 

    width: 110px; 

    height: 110px; 

    border-radius: 12px; 

    overflow: hidden; 

    background: #000;

    border: 2px solid rgba(255,255,255,0.1);

    flex-shrink: 0;

}

.rank-card.top1 .pfp { width: 130px; height: 130px; } 

.rank-card .pfp img { width: 100%; height: 100%; object-fit: cover; object-position: top; }



.rank-card .info { 

    flex: 1; 

    margin-left: 20px; 

    display: flex; 

    flex-direction: column; 

    justify-content: center;

    text-align: left;

}

.rank-card .info .job { font-size: 0.9rem; color: #aaa; font-weight: 600; }

.rank-card .info .name { font-size: 1.3rem; color: #fff; font-weight: 900; margin-top: 5px; }

.rank-card .info .cp { font-size: 1rem; color: var(--highlight); font-weight: 800; margin-top: 8px; }



.rank-card .medal { 

    position: absolute; 

    top: -25px; 

    left: -10px; 

    font-size: 3.5rem; 

    z-index: 3;

}

    </style>

</head>

    async function backgroundPriceSync() {

        const levels = [7, 8, 9, 10];

        const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };

        for (const level of levels) {

            for (const type of ["겁화", "작열"]) {

                try {

                    const res = await fetch(`${BASE_URL}/auctions/items`, { method: 'POST', headers, body: JSON.stringify({ "CategoryCode": 210000, "ItemTier": 4, "ItemName": `${level}레벨 ${type}의 보석`, "PageNo": 1, "Sort": "BUY_PRICE" }) });

                    const data = await res.json();

                    if (data.Items?.length > 0) {

                        const best = data.Items.find(i => i.AuctionInfo?.BuyPrice > 0);

                        if (best) globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;

                    }

                } catch (e) {}

                await new Promise(r => setTimeout(r, 100));

            }

        }

    }



   async function loadNTITotal(forceRefresh = false) {

    const container = document.getElementById('total-list-container');

        if (!forceRefresh && dbData.length === 0) {

        return;
    }   
       
    if (!forceRefresh && dbData.length > 0) {

    container.innerHTML = `<div style="padding:30px; text-align:center;" class="loading-dot">실시간 프로필 데이터를 불러오는 중...</div>`;

    function renderTotalList(data) {

    const container = document.getElementById('total-list-container');

    data.sort((a, b) => {
    const cpA = parseFloat(String(a.cp || a["전투력"] || 0).replace(/,/g, ""));
    const cpB = parseFloat(String(b.cp || b["전투력"] || 0).replace(/,/g, ""));

    if (cpB !== cpA) {
        return cpB - cpA;
    }

    const lvA = parseFloat(String(a.lv || a["아이템레벨"] || 0).replace(/,/g, ""));
    const lvB = parseFloat(String(b.lv || b["아이템레벨"] || 0).replace(/,/g, ""));

    return lvB - lvA;
});

    

    // 상단 랭킹 배너

    let bannerHTML = `<div class="ranking-banner">`;

    const medals = ['🥇', '🥈', '🥉'];



    for (let i = 0; i < Math.min(3, data.length); i++) {

        const char = data[i];

        const pfpUrl = char.pfp || char["사진"] || ""; 



        bannerHTML += `

            <div class="rank-card top${i+1}">

                <div class="medal">${medals[i]}</div>

                <div class="pfp" data-name="${char.name || char["캐릭터명"]}">

                    ${pfpUrl ? `<img src="${pfpUrl}" alt="profile">` : `<div style="line-height:110px; color:#555; text-align:center;">No Image</div>`}

                </div>

                <div class="info">

                    <div class="job">${char.job || char["직업"]}</div>

                    <div class="name">${char.name || char["캐릭터명"]}</div>

                    <div class="cp">${parseFloat(char.cp || char["전투력"]).toLocaleString()}</div>

                </div>

            </div>`;

    }

    bannerHTML += `</div>`;



    // 하단 리스트 헤더 및 내용

    let headerHTML = `<div class="list-header total-grid"><div>순위</div><div>캐릭터명</div><div>직업</div><div>아이템레벨</div><div>전투력</div><div>서버</div></div>`;

    let listHTML = data.map((c, i) => {

        const level = parseFloat(c.lv || c["아이템레벨"]);

        return `

            <div class="list-row total-grid">

                <div>${i + 1}</div>

                <div class="char-name">${c.name || c["캐릭터명"]}</div>

                <div>${c.job || c["직업"]}</div>

                <div style="font-weight:800;">${level.toFixed(2)}</div>

                <div>${parseFloat(c.cp || c["전투력"]).toLocaleString()}</div>

                <div>${c.server || c["서버"]}</div>

            </div>`;

    }).join("");



    container.innerHTML = bannerHTML + headerHTML + listHTML;

}



    async function loadFullDetails(charName, charId, ownerName, charData) {

        const headers = { "accept": "application/json", "Authorization": API_KEY };

        try {

            const [pRes, apRes, agRes, gRes] = await Promise.all([

                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers }),

                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkpassive`, { headers }),

                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkgrid`, { headers }),

                fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/gems`, { headers })

            ]);

            const pData = await pRes.json();

            const apData = await apRes.json();

            const agData = await agRes.json();

            const gData = await gRes.json();



            // 1. 현재 실시간 전투력 파싱

            let currentCp = parseFloat(String(pData?.CombatPower?.Value || pData?.CombatPower || 0).replace(/,/g, ""));

            document.getElementById(`cp-${charId}`).innerText = currentCp.toLocaleString();



            // 2. [수정] DB 전투력(최대값) 로직

            const dbCpEl = document.getElementById(`db-cp-${charId}`);

            // 기존에 표시되어 있던 DB 전투력 숫자 추출

            let existingDbCp = parseFloat(dbCpEl.innerText.replace(/,/g, "")) || 0;

            

            // 실시간 CP가 기존 DB CP보다 클 경우에만 DB값 업데이트

            let finalMaxCp = existingDbCp;

            if (currentCp > existingDbCp) {

                finalMaxCp = currentCp;

                dbCpEl.innerText = finalMaxCp.toLocaleString();

                dbCpEl.style.color = "var(--highlight)"; // 갱신 시 강조 (선택사항)

            } else {

                dbCpEl.innerText = existingDbCp.toLocaleString();

            }



            // 아크패시브 렌더링

            let apSaveText = "Inactive";

            if (apData?.Points && apData.Points.length > 0) {

                apSaveText = apData.Points.map(p => {

                    const m = (p.Description||"").match(/(\d+)랭크\s+(\d+)레벨/);

                    return m ? `${p.Name}: ${m[1]}랭크 ${m[2]}레벨` : "";

                }).filter(v => v).join(" / ");



                document.getElementById(`ap-${charId}`).innerHTML = apData.Points.map(p => {

                    const m = (p.Description||"").match(/(\d+)랭크\s+(\d+)레벨/);

                    if (m) {

                        const rankNum = parseInt(m[1]);

                        const className = rankNum < 6 ? 'low-rank' : '';

                        return `<span>${p.Name}: </span><span class="${className}">${m[1]}랭크 ${m[2]}레벨</span>`;

                    }

                    return "";

                }).join("<br>");

            } else {

                document.getElementById(`ap-${charId}`).innerText = "Inactive";

            }



            // 아크그리드 렌더링

            let agSaveText = "Inactive";

            const agEl = document.getElementById(`ag-${charId}`);

            if (agData?.Slots && agData.Slots.length > 0) {

                agSaveText = agData.Slots.map(s => s.Point).join("/");

                const row1 = agData.Slots.slice(0, 3);

                const row2 = agData.Slots.slice(3, 6);

                agEl.innerHTML = `<div class="ark-grid-container"><div class="ark-grid-row">${row1.map(s => `<div class="grid-item"><img src="${s.Icon}"><span>${s.Point}p</span></div>`).join("")}</div><div class="ark-grid-row">${row2.map(s => `<div class="grid-item"><img src="${s.Icon}"><span>${s.Point}p</span></div>`).join("")}</div></div>`;

            } else { agEl.innerText = "Inactive"; }



            // 보석 계산

            const gemTxt = document.getElementById(`gem-txt-${charId}`);

            const gemGold = document.getElementById(`gem-gold-${charId}`);

            let charTotalGold = 0;

            if (gData?.Gems) {

                let counts = {};

                gData.Gems.forEach(g => {

                    const name = g.Name.replace(/<[^>]*>?/gm, '').replace(/의 보석/g, "").trim();

                    const isBind = name.includes("귀속") || name.includes("이벤트");

                    const cleanName = name.replace(/\(귀속\)|\(이벤트\)/g, "").trim();

                    if (!isBind) { charTotalGold += globalPrices[cleanName.includes("광휘") ? cleanName.replace("광휘", "작열") : cleanName] || 0; }

                    let label = isBind ? cleanName + "(귀속)" : cleanName;

                    counts[label] = (counts[label] || 0) + 1;

                });

                gemTxt.innerText = Object.entries(counts).map(([k,v]) => `${k} ${v}`).join(", ");

                gemGold.innerText = charTotalGold.toLocaleString() + " G";

                

                const totalEl = document.getElementById(`total-gold-${ownerName}`);

                let current = parseInt(totalEl.dataset.sum || 0);

                totalEl.dataset.sum = current + charTotalGold;

                totalEl.innerText = `총 합계: ${parseInt(totalEl.dataset.sum).toLocaleString()} G`;

            } else { gemTxt.innerText = "No Gems"; }



            // [수정] DB 전송 시에도 최대값(finalMaxCp)을 보냄

            syncToSheet({ 

                type: "update_all", 

                name: charName, job: charData.CharacterClassName, lv: charData.ItemAvgLevel, cp: finalMaxCp, server: charData.ServerName, owner: ownerName,

                arkPassive: apSaveText, arkGrid: agSaveText, gemSummary: gemTxt.innerText, gemTotal: charTotalGold

            });



            document.querySelectorAll(`#cp-${charId}, #ap-${charId}, #ag-${charId}`).forEach(el => el.classList.remove('loading-dot'));

        } catch (e) { console.error(e); }

    }



    async function handleMemberTab(name, forceRefresh = false) {

    const listContainer = document.getElementById(`list-${name}`);

    const totalGold = document.getElementById(`total-gold-${name}`);

    if (!forceRefresh && dbData.length === 0) {
        listContainer.innerHTML = `<div class="loading-dot">DB 로딩 중...</div>`;
        return;
    }
    

    if (!forceRefresh && listContainer.dataset.loaded === "true" && dbData.length > 0) return;



    listContainer.innerHTML = "";

    listContainer.dataset.loaded = "true";

    totalGold.dataset.sum = "0";



    const headers = { "accept": "application/json", "Authorization": API_KEY };

    const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, { headers });

    const targets = (await res.json())

        .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)

        .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));



    targets.forEach((char, index) => {

        const charId = (name + char.CharacterName).replace(/\s/g, '');

        const savedData = dbData.find(d => d["캐릭터명"] === char.CharacterName);

        

        const isMain = index === 0;

        const row = document.createElement('div');

        row.className = 'list-row member-grid';

        if (isMain) row.style = 'border: 2px solid var(--highlight); box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.2);';



        const cpVal = savedData ? parseFloat(savedData["전투력"]).toLocaleString() : "...";

        const apVal = savedData ? savedData["아크패시브"].replace(/\//g, "<br>") : "...";

        const agVal = savedData ? savedData["아크그리드"] : "..."; 

        const gemTxtVal = savedData ? savedData["보석요약"] : "로딩 중...";

        const gemGoldVal = savedData ? parseFloat(savedData["보석합계"] || 0).toLocaleString() + " G" : "0 G";



        row.innerHTML = `

            <div><span class="char-name" ${isMain ? 'style="color:var(--highlight);"' : ''}>${char.CharacterName}</span></div>

            <div>${char.ServerName}</div>

            <div style="font-weight:800;">${char.ItemAvgLevel}</div>

            <div id="cp-${charId}">${cpVal}</div>

            <div id="db-cp-${charId}">${cpVal}</div>

            <div id="ap-${charId}">${apVal}</div>

            <div id="ag-${charId}">${agVal}</div>

            <div class="gem-box">

                <div id="gem-txt-${charId}" class="gem-text">${gemTxtVal}</div>

                <div id="gem-gold-${charId}" class="gold-text">${gemGoldVal}</div>

            </div>`;

            

        listContainer.appendChild(row);



        if (forceRefresh || !savedData) {

            loadFullDetails(char.CharacterName, charId, name, char);

        } else {

            renderGridFromDB(charId, savedData["아크그리드"]);

            let currentSum = parseInt(totalGold.dataset.sum || 0);

            totalGold.dataset.sum = currentSum + parseInt(savedData["보석합계"] || 0);

            totalGold.innerText = `총 합계: ${parseInt(totalGold.dataset.sum).toLocaleString()} G`;

        }

    });

    document.getElementById(`time-${name}`).innerText = forceRefresh ? `최근 갱신: ${getCurrentTime()}` : `DB 로드 완료`;

}



    function renderGridFromDB(charId, gridString) {

    const agEl = document.getElementById(`ag-${charId}`);

    if (!gridString || gridString === "Inactive" || gridString === "...") return;

    agEl.innerHTML = `<div style="font-size:0.75rem; color:#888;">${gridString}</div>`;

}

    

    function openTab(evt, tabName) {

        document.querySelectorAll(".content").forEach(c => c.style.display = "none");

        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

        document.getElementById(tabName).style.display = "block";

        evt.currentTarget.classList.add("active");

        if (tabName === 'nti-total') loadNTITotal();

        else if (MEMBERS[tabName]) handleMemberTab(tabName, false);

    }

    async function updateProfileImages(data) {
    const headers = { "accept": "application/json", "Authorization": API_KEY };

    for (const char of data) {
        const charName = char.name || char["캐릭터명"];

        try {
            const res = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers });
            const pData = await res.json();

            const imgUrl = pData?.CharacterImage;
            if (!imgUrl) continue;

            const container = document.querySelector(`.pfp[data-name="${charName}"]`);
            if (!container) continue;

            let img = container.querySelector("img");

            if (!img) {
                img = document.createElement("img");
                container.innerHTML = "";
                container.appendChild(img);
            }

            img.src = imgUrl;

        } catch (e) {
            console.error("이미지 업데이트 실패:", charName);
        }

        await new Promise(r => setTimeout(r, 120)); // rate limit 방지
    }
}
    

    function init() {

        const menu = document.getElementById('tabMenu');

        const container = document.getElementById('tabContents');

        Object.keys(MEMBERS).forEach(name => {

            const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;

            btn.onclick = (e) => openTab(e, name);

            menu.appendChild(btn);

            const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";

            content.innerHTML = `<div style="display:flex; align-items:center; margin-bottom:10px;"><div class="controls"><span id="time-${name}" class="last-update"></span><button class="refresh-btn" onclick="handleMemberTab('${name}', true)">새로고침</button></div></div><div class="list-header member-grid"><div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>DB전투력</div><div>아크패시브</div><div>아크그리드</div><div style="display:flex; justify-content:space-between;"><span>보석 현황</span><span id="total-gold-${name}" style="color:var(--highlight); font-size:0.75rem;">총 합계: 0 G</span></div></div><div id="list-${name}"></div>`;

            container.appendChild(content);

        });

    }

    function toNumber(v) {
    return parseFloat(String(v || 0).replace(/,/g, ""));
}

    window.onload = async () => { 
    init();

    fetchDB();
    backgroundPriceSync();
};

</script>
