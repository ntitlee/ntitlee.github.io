<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { --primary: #4285f4; --bg: #f0f2f5; --card-bg: #ffffff; --danger: #ff4d4f; --success: #52c41a; --text: #1f1f1f; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        
        /* 탭 디자인 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 2px solid #e8e8e8; margin-bottom: 25px; gap: 8px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: #fafafa; border-radius: 10px 10px 0 0; font-weight: 700; transition: all 0.3s; color: #595959; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 -4px 10px rgba(66, 133, 244, 0.2); }

        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 캐릭터 카드 그리드 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { position: relative; border: 1px solid #f0f0f0; border-radius: 14px; background: var(--card-bg); overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        
        /* 이미지 영역 */
        .img-container { width: 100%; height: 180px; background: #2c3e50; overflow: hidden; position: relative; }
        .char-img { width: 100%; height: 100%; object-fit: cover; object-position: top; filter: brightness(0.9); }
        .char-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 15px; color: white; }
        
        .name { font-size: 1.25rem; font-weight: 800; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
        .class-tag { font-size: 0.85rem; background: var(--primary); padding: 2px 8px; border-radius: 4px; margin-left: 8px; }

        .card-body { padding: 20px; }
        .level-row { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; display: flex; justify-content: space-between; }
        
        .info-section { font-size: 0.9rem; border-top: 1px solid #f5f5f5; padding-top: 12px; }
        .data-row { display: flex; margin-bottom: 8px; align-items: flex-start; }
        .label { min-width: 85px; color: #8c8c8c; font-weight: 600; }
        
        /* 아크 그리드 전용 스타일 */
        .grid-badge { display: inline-block; background: #f0f5ff; color: #0050b3; padding: 1px 6px; border-radius: 4px; margin-right: 4px; font-weight: 700; font-size: 0.8rem; border: 1px solid #adc6ff; }
        .ark-r { font-weight: 700; }

        .loading { text-align: center; padding: 60px; color: #bfbfbf; font-weight: 600; font-size: 1.2rem; }
        .error-msg { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-top:0;">🎮 LOA NTI Dashboard</h1>
    
    <div class="tabs" id="tabMenu">
        <button class="tab-btn active" onclick="openTab(event, 'NTI')">NTI 전체</button>
    </div>

    <div id="tabContents">
        <div id="NTI" class="content active">
            <h2>📊 NTI 전체 대시보드</h2>
            <p>멤버별 원정대 현황을 실시간으로 확인합니다.</p>
            <div id="NTI-Summary"></div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    
    // [중요] API 키를 입력하세요
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');

        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = name;
            content.className = 'content';
            content.innerHTML = `<h2>👤 ${name} (${MEMBERS[name]})</h2><div class="grid" id="grid-${name}"><p class="loading">탭을 클릭하면 데이터를 불러옵니다.</p></div>`;
            container.appendChild(content);
        });

        ["수집품", "클리어골드"].forEach(extra => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = extra;
            btn.onclick = (e) => openTab(e, extra);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = extra;
            content.className = 'content';
            content.innerHTML = `<h2>✨ ${extra}</h2><div id="data-${extra}" style="padding:40px; text-align:center; color:#999;">준비 중...</div>`;
            container.appendChild(content);
        });
    }

    async function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");

        if (MEMBERS[tabName]) fetchMemberFullData(tabName, MEMBERS[tabName]);
    }

    async function fetchMemberFullData(mName, cName) {
        const grid = document.getElementById(`grid-${mName}`);
        grid.innerHTML = '<div class="loading">데이터를 가져오는 중입니다...</div>';

        const headers = { "accept": "application/json", "Authorization": API_KEY };

        try {
            const sibRes = await fetch(`${BASE_URL}/characters/${encodeURIComponent(cName)}/siblings`, { headers });
            const siblings = await sibRes.json();
            
            // 1640 이상 필터링 및 레벨순 정렬
            const targets = siblings
                .filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640)
                .sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

            grid.innerHTML = "";

            for (const char of targets) {
                // 프로필(이미지), 아크패시브, 아크그리드 3개 동시 호출
                const [pRes, apRes, agRes] = await Promise.all([
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, { headers }),
                    fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkgrid`, { headers })
                ]);

                const pData = await pRes.json();
                const apData = await apRes.json();
                const agData = await agRes.json();

                // 이미지 경로 및 전투력
                const charImg = pData?.CharacterImage || "https://res.cloudinary.com/dn6bi8fay/image/upload/v1677134371/lostark_noprofile_mqyv2q.png";
                let cp = pData?.CombatPower?.Value || pData?.CombatPower || "0";
                cp = Number(parseFloat(String(cp).replace(/,/g, "")).toFixed(0)).toLocaleString();

                // 아크 패시브 (랭크 5 이하 강조)
                let apHtml = "비활성화";
                if (apData?.Points) {
                    apHtml = apData.Points.map(p => {
                        const m = (p.Description || "").match(/(\d+)랭크/);
                        const r = m ? parseInt(m[1]) : 0;
                        return `<span class="ark-r" style="color:${r <= 5 ? 'var(--danger)' : 'var(--success)'}">${p.Name[0]}${r}</span>`;
                    }).join(" / ");
                }

                // 아크 그리드 (포인트 요약)
                let agHtml = "미설정";
                if (agData?.Slots) {
                    agHtml = agData.Slots.map(s => `<span class="grid-badge">${s.Name[0]}${s.Point}P</span>`).join("");
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${charImg}" class="char-img" onerror="this.src='https://via.placeholder.com/300x180?text=NO+IMAGE'">
                        <div class="char-overlay">
                            <span class="name">${char.CharacterName}</span>
                            <span class="class-tag">${char.CharacterClassName}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="level-row">
                            <span>Lv. ${char.ItemAvgLevel}</span>
                            <span style="font-size:0.85rem; color:#999;">${char.ServerName}</span>
                        </div>
                        <div class="info-section">
                            <div class="data-row"><span class="label">전투력</span> <b>${cp}</b></div>
                            <div class="data-row"><span class="label">아크패시브</span> <span>${apHtml}</span></div>
                            <div class="data-row"><span class="label">아크그리드</span> <div>${agHtml}</div></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        } catch (e) {
            grid.innerHTML = `<div class="error-msg"><b>데이터 로드 실패</b><br>${e.message}</div>`;
        }
    }

    window.onload = init;
</script>
</body>
</html>
