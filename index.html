<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>LOA NTI Dashboard - Final Fix</title>

    <style>

        :root { 

            --bg: #121212; --card-bg: #1e1e1e; --border: #333;

            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4d;

        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); line-height: 1.2; }

        .container { max-width: 1650px; margin: 0 auto; padding: 0 20px; }

        

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; gap: 4px; align-items: center; }

        .tab-btn { padding: 8px 18px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }

        .tab-btn.active { background: var(--primary); color: white; }



        .controls { margin-left: auto; display: flex; align-items: center; gap: 15px; }

        .last-update { font-size: 0.75rem; color: #888; }

        .refresh-btn { padding: 6px 15px; font-size: 0.8rem; background: #444; color: #eee; border: none; border-radius: 4px; cursor: pointer; }

        .member-grid { grid-template-columns: 150px 90px 90px 110px 110px 130px 280px 1fr; }

        .list-header, .list-row { display: grid; gap: 8px; align-items: center; text-align: center; font-size: 0.82rem; }

        .list-header { background: #252525; padding: 10px 8px; font-weight: 800; border-bottom: 2px solid var(--border); }

        .list-row { background: var(--card-bg); padding: 8px; border-bottom: 1px solid var(--border); min-height: 80px; }

        .main-character { border: 2px solid var(--highlight); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }

        .char-name { font-weight: 800; color: #fff; }

        

        /* 아크패시브 6R 이하 강조 */

        .low-rank { color: var(--danger); font-weight: 900; }



        /* 아크그리드 배치 */

        .ark-grid-container { display: flex; flex-direction: column; gap: 6px; width: 100%; align-items: center; }

        .ark-grid-row { display: flex; gap: 8px; justify-content: center; width: 100%; }

        .grid-item {
    gap: 2px;
    font-size: 0.7rem;
}
        .grid-item img { width: 20px; height: 20px; border-radius: 2px; }



        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 60vh; flex-direction: column; }

        .image-container { max-width: 700px; width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #444; margin-bottom: 20px; }

        .image-container img { width: 100%; height: auto; display: block; }



        .gem-box { position: relative; text-align: left; display: flex; flex-direction: column; padding-left: 5px; }

        .gem-text { font-size: 0.72rem; color: #aaa; line-height: 1.3; margin-bottom: 15px; }

        .gold-text { position: absolute; bottom: 0; right: 5px; color: var(--highlight); font-size: 0.85rem; font-weight: 800; }

        

        .loading-dot { color: #555; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }



    /* 통합 그리드 비율 */

.total-grid { 

    display: grid;

    grid-template-columns: 60px 160px 130px 110px 150px 80px; 

    gap: 8px; 

    align-items: center; 

    text-align: center;

    margin-top: 10px; 

}



/* --- 랭킹 프로필 카드 스타일 --- */

.ranking-banner { 

    display: flex; 

    gap: 30px; 

    margin: 40px 0; 

    justify-content: center; 

    align-items: flex-end; 

}



.rank-card { 

    position: relative; 

    width: 320px; 

    height: 140px; 

    background: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);

    border-radius: 16px; 

    border: 1px solid var(--border);

    display: flex;

    align-items: center;

    padding: 15px;

    box-sizing: border-box;

}



.rank-card.top1 { 

    width: 360px; height: 160px; 

    border: 2px solid var(--highlight); 

    box-shadow: 0 0 25px rgba(255, 204, 0, 0.2);

    z-index: 2;

}



.rank-card .pfp { 

    width: 110px; 

    height: 110px; 

    border-radius: 12px; 

    overflow: hidden; 

    background: #000;

    border: 2px solid rgba(255,255,255,0.1);

    flex-shrink: 0;

}

.rank-card.top1 .pfp { width: 130px; height: 130px; } 

.rank-card .pfp img { width: 100%; height: 100%; object-fit: cover; object-position: top; }



.rank-card .info { 

    flex: 1; 

    margin-left: 20px; 

    display: flex; 

    flex-direction: column; 

    justify-content: center;

    text-align: left;

}

.rank-card .info .job { font-size: 0.9rem; color: #aaa; font-weight: 600; }

.rank-card .info .name { font-size: 1.3rem; color: #fff; font-weight: 900; margin-top: 5px; }

.rank-card .info .cp { font-size: 1rem; color: var(--highlight); font-weight: 800; margin-top: 8px; }



.rank-card .medal { 

    position: absolute; 

    top: -25px; 

    left: -10px; 

    font-size: 3.5rem; 

    z-index: 3;

}

.ark-box {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 0.75rem;
}

    </style>

</head>

<body>



<div class="container">

    <div id="tabMenu" class="tabs">

        <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>

        <button class="tab-btn" onclick="openTab(event, 'nti-total')">통합</button>

    </div>

    <div id="tabContents">

        <div id="welcome-page" class="content">

            <div class="image-container"><img src="welcome.png"></div>

            <h2>LOA NTI Dashboard</h2>

            <p style="color:#888;">상단 메뉴에서 데이터를 확인하세요.</p>

        </div>

        

        <div id="nti-total" class="content" style="display:none;">

            <div style="display:flex; align-items:center; margin-bottom:10px;">

                <div class="controls">

                    <span id="time-total" class="last-update"></span>

                    <button class="refresh-btn" onclick="loadNTITotal(true)">새로고침</button>

                </div>

            </div>

            <div id="total-list-container"></div>

        </div>

    </div>

</div>



<script>

const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
const API_KEY = "Bearer [본인의 API 키]"; 
const BASE_URL = "https://developer-lostark.game.onstove.com";
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwGkUNXR8uGB_ouu9qsrDKt7ws6stnmCVA0Hs-sF9xd0fhMwcBtBxeQtGwrPzglUxiLmw/exec";

let dbData = []; 
let globalPrices = {};
const memberLoading = {}; 

function getCurrentTime() {
    const now = new Date();
    return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
}

async function syncToSheet(data) {
    try { fetch(SHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); } catch (e) {}
}

async function fetchDB() {
    try {
        const res = await fetch(SHEET_API_URL);
        dbData = await res.json();
        console.log("DB 로드 완료");
    } catch (e) { console.error("DB 로드 실패"); }
}

async function backgroundPriceSync() {
    const levels = [7, 8, 9, 10];
    const headers = { "accept": "application/json", "Authorization": API_KEY, "Content-Type": "application/json" };
    for (const level of levels) {
        for (const type of ["겁화", "작열"]) {
            try {
                const res = await fetch(`${BASE_URL}/auctions/items`, { 
                    method: 'POST', headers, 
                    body: JSON.stringify({ "CategoryCode": 210000, "ItemTier": 4, "ItemName": `${level}레벨 ${type}의 보석`, "PageNo": 1, "Sort": "BUY_PRICE" }) 
                });
                const data = await res.json();
                if (data.Items?.length > 0) {
                    const best = data.Items.find(i => i.AuctionInfo?.BuyPrice > 0);
                    if (best) globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;
                }
            } catch (e) {}
            await new Promise(r => setTimeout(r, 100));
        }
    }
}

async function loadNTITotal(forceRefresh = false) {
    const container = document.getElementById('total-list-container');
    if (!forceRefresh && dbData.length === 0) {
        container.innerHTML = `<div class="loading-dot">DB 로딩 중...</div>`;
        setTimeout(() => loadNTITotal(false), 500);
        return;
    }
    if (!forceRefresh && container.dataset.loaded === "true") return;

    let allChars = [];
    if (!forceRefresh && dbData.length > 0) {
        allChars = dbData.map(d => ({
            name: d["캐릭터명"], job: d["직업"], lv: parseFloat(d["아이템레벨"]), cp: parseFloat(d["전투력"]), server: d["서버"], pfp: d["사진"]
        }));
    } else {
        container.innerHTML = `<div style="padding:30px; text-align:center;" class="loading-dot">실시간 데이터를 불러오는 중...</div>`;
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        for (const owner of Object.values(MEMBERS)) {
            const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(owner)}/siblings`, { headers });
            const sibs = await res.json();
            if (!sibs) continue;
            const filteredSibs = sibs.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1680);
            for (const char of filteredSibs) {
                const pRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers });
                const pData = await pRes.json();
                const realCp = parseFloat(String(pData?.CombatPower?.Value || pData?.CombatPower || 0).replace(/,/g, ""));
                allChars.push({ name: char.CharacterName, job: char.CharacterClassName, lv: parseFloat(char.ItemAvgLevel.replace(/,/g, "")), cp: realCp, server: char.ServerName, pfp: pData?.CharacterImage || "" });
                await new Promise(r => setTimeout(r, 150));
            }
        }
    }
    renderTotalList(allChars);
    updateProfileImages(allChars);
    document.getElementById('time-total').innerText = `최근 갱신: ${getCurrentTime()}`;
}

function renderTotalList(data) {
    const container = document.getElementById('total-list-container');
    data.sort((a, b) => (b.cp || 0) - (a.cp || 0));
    
    let bannerHTML = `<div class="ranking-banner">`;
    const medals = ['🥇', '🥈', '🥉'];
    for (let i = 0; i < Math.min(3, data.length); i++) {
        const char = data[i];
        bannerHTML += `
            <div class="rank-card top${i+1}">
                <div class="medal">${medals[i]}</div>
                <div class="pfp" data-name="${char.name}"><img src="${char.pfp || ''}"></div>
                <div class="info">
                    <div class="job">${char.job}</div>
                    <div class="name">${char.name}</div>
                    <div class="cp">${(char.cp || 0).toLocaleString()}</div>
                </div>
            </div>`;
    }
    bannerHTML += `</div>`;
    
    let listHTML = `<div class="list-header total-grid"><div>순위</div><div>캐릭터명</div><div>직업</div><div>레벨</div><div>전투력</div><div>서버</div></div>`;
    listHTML += data.map((c, i) => `
        <div class="list-row total-grid">
            <div>${i + 1}</div>
            <div class="char-name">${c.name}</div>
            <div>${c.job}</div>
            <div style="font-weight:800;">${c.lv.toFixed(2)}</div>
            <div>${(c.cp || 0).toLocaleString()}</div>
            <div>${c.server}</div>
        </div>`).join("");
    
    container.innerHTML = bannerHTML + listHTML;
    container.dataset.loaded = "true";
}

async function loadFullDetails(charName, charId, ownerName, charData) {
    const headers = { "accept": "application/json", "Authorization": API_KEY };
    try {
        const [pRes, apRes, agRes, gRes] = await Promise.all([
            fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers }),
            fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkpassive`, { headers }),
            fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkgrid`, { headers }),
            fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/gems`, { headers })
        ]);
        const pData = await pRes.json();
        const apData = await apRes.json();
        const agData = await agRes.json();
        const gData = await gRes.json();

        let currentCp = parseFloat(String(pData?.CombatPower?.Value || pData?.CombatPower || 0).replace(/,/g, ""));
        document.getElementById(`cp-${charId}`).innerText = currentCp.toLocaleString();

        let apSaveText = "Inactive";
        if (apData?.Points?.length > 0) {
            apSaveText = apData.Points.map(p => {
                const m = (p.Description||"").match(/(\d+)랭크\s+(\d+)레벨/);
                return m ? `${p.Name}: ${m[1]}랭크 ${m[2]}레벨` : "";
            }).filter(v => v).join(" / ");
            document.getElementById(`ap-${charId}`).innerHTML = apData.Points.map(p => {
                const m = (p.Description||"").match(/(\d+)랭크\s+(\d+)레벨/);
                return m ? `<span>${p.Name}: </span><span class="${parseInt(m[1]) < 6 ? 'low-rank' : ''}">${m[1]}랭크 ${m[2]}레벨</span>` : "";
            }).join("<br>");
        } else { document.getElementById(`ap-${charId}`).innerText = "Inactive"; }

        let gemTxt = "No Gems", charTotalGold = 0;
        if (gData?.Gems) {
            let counts = {};
            gData.Gems.forEach(g => {
                const name = g.Name.replace(/<[^>]*>?/gm, '').replace(/의 보석/g, "").trim();
                const isBind = name.includes("귀속") || name.includes("이벤트");
                const cleanName = name.replace(/\(귀속\)|\(이벤트\)/g, "").trim();
                if (!isBind) charTotalGold += globalPrices[cleanName.includes("광휘") ? cleanName.replace("광휘", "작열") : cleanName] || 0;
                let label = isBind ? cleanName + "(귀속)" : cleanName;
                counts[label] = (counts[label] || 0) + 1;
            });
            gemTxt = Object.entries(counts).map(([k,v]) => `${k} ${v}`).join(", ");
        }
        document.getElementById(`gem-txt-${charId}`).innerText = gemTxt;
        document.getElementById(`gem-gold-${charId}`).innerText = charTotalGold.toLocaleString() + " G";

        syncToSheet({ 
            type: "update_all", name: charName, job: charData.CharacterClassName, lv: charData.ItemAvgLevel, cp: currentCp, 
            server: charData.ServerName, owner: ownerName, arkPassive: apSaveText, gemSummary: gemTxt, gemTotal: charTotalGold 
        });
        document.querySelectorAll(`#cp-${charId}, #ap-${charId}`).forEach(el => el.classList.remove('loading-dot'));
    } catch (e) { console.error(e); }
}

async function handleMemberTab(name, forceRefresh = false) {
    if (memberLoading[name]) return;
    const listContainer = document.getElementById(`list-${name}`);
    if (!forceRefresh && listContainer.dataset.loaded === "true") return;

    memberLoading[name] = true;
    listContainer.innerHTML = `<div class="loading-dot">데이터 로딩 중...</div>`;
    
    try {
        const headers = { "accept": "application/json", "Authorization": API_KEY };
        const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, { headers });
        const targets = (await res.json()).filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1640);
        
        listContainer.innerHTML = "";
        for (const [index, char] of targets.entries()) {
            const charId = (name + char.CharacterName).replace(/\s/g, '');
            const row = document.createElement('div');
            row.className = 'list-row member-grid';
            row.innerHTML = `
                <div class="char-name">${char.CharacterName}</div>
                <div>${char.ServerName}</div>
                <div>${char.ItemAvgLevel}</div>
                <div id="cp-${charId}" class="loading-dot">...</div>
                <div id="db-cp-${charId}">-</div>
                <div id="ap-${charId}" class="loading-dot">...</div>
                <div id="ag-${charId}">-</div>
                <div class="gem-box"><div id="gem-txt-${charId}" class="gem-text">...</div><div id="gem-gold-${charId}" class="gold-text">0 G</div></div>`;
            listContainer.appendChild(row);
            await loadFullDetails(char.CharacterName, charId, name, char);
            await new Promise(r => setTimeout(r, 150));
        }
        listContainer.dataset.loaded = "true";
    } finally { memberLoading[name] = false; }
}

function openTab(evt, tabName) {
    document.querySelectorAll(".content").forEach(c => c.style.display = "none");
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
    if (tabName === 'nti-total') loadNTITotal();
    else if (MEMBERS[tabName]) handleMemberTab(tabName, false);
}

async function updateProfileImages(data) {
    const headers = { "accept": "application/json", "Authorization": API_KEY };
    for (const char of data) {
        const container = document.querySelector(`.pfp[data-name="${char.name}"]`);
        if (container && !container.querySelector("img").src) {
            try {
                const res = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.name)}/profiles`, { headers });
                const pData = await res.json();
                if (pData?.CharacterImage) container.querySelector("img").src = pData.CharacterImage;
            } catch (e) {}
            await new Promise(r => setTimeout(r, 100));
        }
    }
}

function init() {
    const menu = document.getElementById('tabMenu');
    const container = document.getElementById('tabContents');
    Object.keys(MEMBERS).forEach(name => {
        const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.innerText = name;
        btn.onclick = (e) => openTab(e, name);
        menu.appendChild(btn);
        const content = document.createElement('div'); content.id = name; content.className = 'content'; content.style.display = "none";
        content.innerHTML = `<div class="controls"><span id="time-${name}" class="last-update"></span><button class="refresh-btn" onclick="handleMemberTab('${name}', true)">새로고침</button></div>
                             <div class="list-header member-grid"><div>캐릭터</div><div>서버</div><div>레벨</div><div>실시간CP</div><div>DB_CP</div><div>아크패시브</div><div>그리드</div><div>보석</div></div>
                             <div id="list-${name}"></div>`;
        container.appendChild(content);
    });
}

window.onload = async () => { 
    init(); 
    await fetchDB(); 
    backgroundPriceSync(); 
};

</script>

</body>

</html>
