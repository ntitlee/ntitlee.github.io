<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>LOA NTI Dashboard</title>

  <style>
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --border: #333;
      --text: #e0e0e0;
      --primary: #4285f4;
      --highlight: #ffcc00;
      --danger: #ff4d4d;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 20px;
      color: var(--text);
      line-height: 1.2;
    }

    .container {
      max-width: 1650px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 15px;
      gap: 4px;
      align-items: center;
    }

    .tab-btn {
      padding: 8px 18px;
      cursor: pointer;
      border: none;
      background: #2a2a2a;
      color: #888;
      border-radius: 6px 6px 0 0;
      font-weight: 700;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .last-update {
      font-size: 0.75rem;
      color: #888;
    }

    .refresh-btn {
      padding: 6px 15px;
      font-size: 0.8rem;
      background: #444;
      color: #eee;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .member-grid {
      grid-template-columns: 150px 90px 90px 110px 110px 130px 280px 1fr;
    }

    .list-header,
    .list-row {
      display: grid;
      gap: 8px;
      align-items: center;
      text-align: center;
      font-size: 0.82rem;
    }

    .list-header {
      background: #252525;
      padding: 10px 8px;
      font-weight: 800;
      border-bottom: 2px solid var(--border);
    }

    .list-row {
      background: var(--card-bg);
      padding: 8px;
      border-bottom: 1px solid var(--border);
      min-height: 80px;
    }

    .main-character {
      border: 2px solid var(--highlight);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
    }

    .char-name {
      font-weight: 800;
      color: #fff;
    }

    .low-rank {
      color: var(--danger);
      font-weight: 900;
    }

    .ark-grid-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      align-items: center;
    }

    .ark-grid-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .grid-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.75rem;
      min-width: 45px;
    }

    .grid-item img {
      width: 18px;
      height: 18px;
      border-radius: 2px;
      display: block;
    }

    #welcome-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
      flex-direction: column;
    }

    .image-container {
      max-width: 700px;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #444;
      margin-bottom: 20px;
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .gem-box {
      position: relative;
      text-align: left;
      display: flex;
      flex-direction: column;
      padding-left: 5px;
    }

    .gem-text {
      font-size: 0.72rem;
      color: #aaa;
      line-height: 1.3;
      margin-bottom: 15px;
    }

    .gold-text {
      position: absolute;
      bottom: 0;
      right: 5px;
      color: var(--highlight);
      font-size: 0.85rem;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- 탭 메뉴 -->
    <div id="tabMenu" class="tabs">
      <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
      <button class="tab-btn" onclick="openTab(event, 'nti-total')">통합</button>
      <button class="tab-btn" onclick="openTab(event, 'roulette-tab')">룰렛</button>
    </div>

    <!-- 컨텐츠 -->
    <div id="tabContents">

      <!-- 홈 -->
      <div id="welcome-page" class="content">
        <div class="image-container">
          <img src="welcome.png">
        </div>
        <h2>LOA NTI Dashboard</h2>
        <p style="color:#888;">상단 메뉴에서 데이터를 확인하세요.</p>
      </div>

      <!-- 통합 -->
      <div id="nti-total" class="content" style="display:none;">
        <div style="display:flex; align-items:center; margin-bottom:10px;">
          <div class="controls">
            <span id="time-total" class="last-update"></span>
            <button class="refresh-btn" onclick="loadNTITotal(true)">새로고침</button>
          </div>
        </div>
        <div id="total-list-container"></div>
      </div>

      <!-- 룰렛 -->
      <div id="roulette-tab" class="content" style="display:none; padding:0;">
        <iframe
          src="./roulette/index.html"
          style="width:100%; height:850px; border:none; border-radius:12px; background:#000;"
          title="Marble Roulette">
        </iframe>
      </div>

    </div>
  </div>

<script>
    const MEMBERS = {
  "기태": "로우프",
  "동근": "저녁별빛",
  "민구": "그저애송이",
  "민기": "minki",
  "석준": "famousamos",
  "준영": "DD키리",
  "찬엽": "탑소라카"
};

const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg";
const BASE_URL = "https://developer-lostark.game.onstove.com";
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwGkUNXR8uGB_ouu9qsrDKt7ws6stnmCVA0Hs-sF9xd0fhMwcBtBxeQtGwrPzglUxiLmw/exec";

let dbData = [];
let globalPrices = {};
const memberLoading = {};

// ================= 공통 =================
function getCurrentTime() {
  const now = new Date();
  return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

function toNum(v) {
  return parseFloat(String(v || 0).replace(/[^0-9.]/g, "")) || 0;
}

// ================= DB =================
async function fetchDB() {
  try {
    const res = await fetch(SHEET_API_URL);
    dbData = await res.json();
  } catch (e) {
    console.error("DB 로드 실패", e);
  }
}

// ================= 보석 가격 =================
async function backgroundPriceSync() {
  const levels = [7,8,9,10];

  for (const level of levels) {
    for (const type of ["겁화","작열"]) {
      try {
        const res = await fetch(`${BASE_URL}/auctions/items`, {
          method: "POST",
          headers: {
            "accept": "application/json",
            "Authorization": API_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            CategoryCode: 210000,
            ItemTier: 4,
            ItemName: `${level}레벨 ${type}의 보석`,
            PageNo: 1,
            Sort: "BUY_PRICE"
          })
        });

        const data = await res.json();
        const best = data.Items?.find(i => i.AuctionInfo?.BuyPrice > 0);

        if (best) {
          globalPrices[`${level}레벨 ${type}`] = best.AuctionInfo.BuyPrice;
        }

      } catch (e) {}

      await new Promise(r => setTimeout(r,100));
    }
  }
}

// ================= 핵심 =================
async function loadFullDetails(charName, charId, ownerName, charData) {

  const lvEl = document.getElementById(`lv-${charId}`);
  const cpEl = document.getElementById(`cp-${charId}`);
  const dbCpEl = document.getElementById(`db-cp-${charId}`);
  const apEl = document.getElementById(`ap-${charId}`);
  const agEl = document.getElementById(`ag-${charId}`);

  const savedLv = toNum(charData.lv || charData["아이템레벨"]);
  const savedCp = toNum(charData.cp || charData["전투력"]);
  const savedApText = String(charData["아크패시브"] || "");

  try {

    const [pRes, apRes, agRes, gRes] = await Promise.all([
      fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/profiles`, { headers: { Authorization: API_KEY } }),
      fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkpassive`, { headers: { Authorization: API_KEY } }),
      fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/arkgrid`, { headers: { Authorization: API_KEY } }),
      fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(charName)}/gems`, { headers: { Authorization: API_KEY } })
    ]);

    const pData = await pRes.json();
    const apData = await apRes.json();
    const agData = await agRes.json();
    const gData = await gRes.json();

    const currentLv = toNum(pData.ItemAvgLevel);
    const currentCp = Math.floor(toNum(pData?.CombatPower?.Value || pData?.CombatPower));

    // 레벨
    if (lvEl) {
      if (savedLv > 0 && currentLv > savedLv) lvEl.classList.add("glow-text");
      lvEl.innerText = currentLv.toFixed(2);
    }

    // 전투력
    if (cpEl && dbCpEl) {
      cpEl.innerText = currentCp.toLocaleString();

      if (savedCp > 0 && currentCp > savedCp) {
        dbCpEl.classList.add("glow-text");
      }

      dbCpEl.innerText = Math.max(savedCp, currentCp).toLocaleString();
    }

    // 아크패시브
    if (apEl && apData?.Points) {
      apEl.innerHTML = apData.Points.map(p => {
        const m = (p.Description || "").match(/(\d+)랭크\s+(\d+)레벨/);
        if (!m) return "";

        return `${p.Name}: ${m[1]}랭크 ${m[2]}레벨`;
      }).join("<br>");
    }

    // 아크그리드
    if (agEl && agData?.Slots) {
      agEl.innerHTML = agData.Slots.map(s =>
        `<span>${s.Point}</span>`
      ).join(" / ");
    }

    // ===== 보석 골드 =====
    let charTotalGold = 0;

    if (gData?.Gems) {
      gData.Gems.forEach(g => {
        const name = g.Name.replace(/<[^>]*>?/gm, '')
          .replace(/의 보석/g, "")
          .trim();

        const cleanName = name.replace(/\(귀속\)|\(이벤트\)/g, "").trim();

        charTotalGold += globalPrices[cleanName] || 0;
      });
    }

    // ===== 합계 =====
    const totalEl = document.getElementById(`total-gold-${ownerName}`);

    if (totalEl) {
      const current = parseInt(totalEl.dataset.sum || "0");
      totalEl.dataset.sum = current + charTotalGold;
      totalEl.innerText = `총 합계: ${parseInt(totalEl.dataset.sum).toLocaleString()} G`;
    }

  } catch (e) {
    console.error("상세 로드 실패", e);
  }
}

// ================= 멤버 =================
async function handleMemberTab(name, force=false) {

  if (memberLoading[name]) return;

  const list = document.getElementById(`list-${name}`);
  const totalEl = document.getElementById(`total-gold-${name}`);

  if (totalEl) {
    totalEl.dataset.sum = 0;
    totalEl.innerText = "총 합계: 0 G";
  }

  try {
    const res = await fetch(`${BASE_URL}/characters/${encodeURIComponent(MEMBERS[name])}/siblings`, {
      headers: { Authorization: API_KEY }
    });

    const chars = await res.json();

    list.innerHTML = "";

    for (const c of chars) {
      const id = (name + c.CharacterName).replace(/\s/g,'');

      list.innerHTML += `
        <div class="list-row member-grid">
          <div>${c.CharacterName}</div>
          <div>${c.ServerName}</div>
          <div id="lv-${id}">${c.ItemAvgLevel}</div>
          <div id="cp-${id}">...</div>
          <div id="db-cp-${id}">0</div>
          <div id="ap-${id}">...</div>
          <div id="ag-${id}">...</div>
        </div>
      `;

      loadFullDetails(c.CharacterName, id, name, c);
    }

  } catch (e) {
    console.error(e);
    list.innerHTML = "실패";
  }
}

// ================= 탭 =================
function openTab(evt, tabName) {

  document.querySelectorAll(".content").forEach(c => c.style.display = "none");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).style.display = "block";
  evt.currentTarget.classList.add("active");

  if (tabName === "nti-total") {
    document.getElementById('time-total').innerText = getCurrentTime();
  }

  if (MEMBERS[tabName]) {
    handleMemberTab(tabName);
  }
}

// ================= INIT =================
function init() {
  const menu = document.getElementById('tabMenu');

  Object.keys(MEMBERS).forEach(name => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.innerText = name;
    btn.onclick = (e) => openTab(e, name);
    menu.appendChild(btn);
  });
}

window.onload = async () => {
  init();
  await fetchDB();
  await backgroundPriceSync();
};
</script>

</body>
</html>
