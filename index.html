<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LOA NTI Dashboard</title>
    <style>
        :root { 
            --bg: #121212; --card-bg: #1e1e1e; --border: #333;
            --text: #e0e0e0; --primary: #4285f4; --highlight: #ffcc00; --danger: #ff4d4f;
            /* 티어별 색상 정의 */
            --t1750: #4a2b2b; --t1730: #4a3a2b; --t1720: #4a452b; --t1710: #2b3a2b; --t1700: #2b3a4a;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1850px; margin: 0 auto; }
        
        /* 상단 탭 스타일 */
        .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: none; background: #2a2a2a; color: #888; border-radius: 8px 8px 0 0; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn.special { background: #3d5afe; color: white; } /* 통합 탭 강조 */

        /* 리스트 공통 스타일 */
        .list-header, .list-row { display: grid; grid-template-columns: 100px 180px 150px 120px 150px 1fr; gap: 12px; align-items: center; text-align: center; font-size: 0.85rem; }
        .list-header { background: #252525; padding: 12px; font-weight: 800; border-bottom: 2px solid var(--border); }
        .list-row { background: var(--card-bg); padding: 12px; border-bottom: 1px solid var(--border); }
        
        /* [중요] 앱스크립트 티어별 배경색 적용 */
        .row-1750 { background-color: #4c2626 !important; font-weight: bold; }
        .row-1730 { background-color: #4c3a26 !important; font-weight: bold; }
        .row-1720 { background-color: #4c4626 !important; }
        .row-1710 { background-color: #263c26 !important; }
        .row-1700 { background-color: #26364c !important; }

        /* 개인 멤버 리스트용 그리드 (기존 유지) */
        .member-grid { grid-template-columns: 180px 100px 100px 140px 180px 240px 250px 1fr; }

        /* 홈 화면 스타일 (사진만 강조) */
        #welcome-page { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .welcome-card { max-width: 800px; width: 100%; text-align: center; }
        .image-container { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #444; }
        .image-container img { width: 100%; height: auto; display: block; }

        .loading-dot { color: #555; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="tabMenu" class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'welcome-page')">Home</button>
        <button class="tab-btn special" onclick="openTab(event, 'nti-total')">📊 NTI 통합 (1680+)</button>
        </div>
    
    <div id="tabContents">
        <div id="welcome-page" class="content">
            <div class="welcome-card">
                <div class="image-container">
                    <img src="welcome.png" alt="Welcome NTI">
                </div>
            </div>
        </div>

        <div id="nti-total" class="content" style="display:none;">
            <div class="list-header">
                <div>등급</div><div>캐릭터명</div><div>직업</div><div>아이템레벨</div><div>전투력</div><div>서버</div>
            </div>
            <div id="total-list-container">
                <div style="padding: 50px; text-align: center;" class="loading-dot">전체 인원 데이터를 불러오는 중입니다...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const MEMBERS = { "기태": "로우프", "동근": "저녁별빛", "민구": "그저애송이", "민기": "minki", "석준": "famousamos", "준영": "DD키리", "찬엽": "탑소라카" };
    const API_KEY = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyIsImtpZCI6IktYMk40TkRDSTJ5NTA5NWpjTWk5TllqY2lyZyJ9.eyJpc3MiOiJodHRwczovL2x1ZHkuZ2FtZS5vbnN0b3ZlLmNvbSIsImF1ZCI6Imh0dHBzOi8vbHVkeS5nYW1lLm9uc3RvdmUuY29tL3Jlc291cmNlcyIsImNsaWVudF9pZCI6IjEwMDAwMDAwMDA1OTA2ODYifQ.oGh7TNKFkdANL7nZJbKMAqjmQBO_EauyWaRDuq0QJQ2l0sABfpTTKvYEdkixZ8hZqW5iVN_mDIsYdI6pcnIJ-w3j7EFTI8GKdUNo-QVn412LALUhx_gXd-a2WekBYtDgjZAaAfmjqal63JjfoXdJYz5mNRZX9bqkcpuX7gkSDU9bi7Bvik4gmT4kEt6WJ1sOnch8Bbi3bDGLUoXEbRjWiebszAdo2qmsg6sXu3Ah26PhMsosIzkPaW0y5wBDnSOQtt2N4sEFNO0jiwzfaygOO4pu6jQFzTsUjL4xNBKtqpB1HS5gpxadAwJD1umBEMaF-BQZEu3pdu9Ja8MvDpqfUg"; 
    const BASE_URL = "https://developer-lostark.game.onstove.com";

    function stripHtml(html) { return html ? html.replace(/<[^>]*>?/gm, '').trim() : ""; }

    // 탭 전환 함수
    function openTab(evt, tabName) {
        document.querySelectorAll(".content").forEach(c => c.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");

        if (tabName === 'nti-total') loadNTITotal();
    }

    // [신규] NTI 통합 데이터 로드 (1680 이상)
    async function loadNTITotal() {
        const container = document.getElementById('total-list-container');
        if (container.dataset.loaded === "true") return; // 이미 로딩했으면 패스

        const headers = { "accept": "application/json", "Authorization": API_KEY };
        let allCharacters = [];

        try {
            // 모든 멤버의 원정대 캐릭터 호출
            const promises = Object.values(MEMBERS).map(name => 
                fetch(`${BASE_URL}/characters/${encodeURIComponent(name)}/siblings`, { headers }).then(r => r.json())
            );
            const results = await Promise.all(promises);

            // 1680 이상 필터링 및 프로필 상세 호출
            for (const siblings of results) {
                if (!siblings) continue;
                const filtered = siblings.filter(c => parseFloat(c.ItemAvgLevel.replace(/,/g, "")) >= 1680);
                
                for (const char of filtered) {
                    const pRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/profiles`, { headers });
                    const pData = await pRes.json();
                    
                    const lv = parseFloat(char.ItemAvgLevel.replace(/,/g, ""));
                    const cp = parseInt(String(pData?.CombatPower || 0).replace(/,/g, ""));
                    
                    // 티어 결정 (앱스크립트 로직 동일)
                    let tier = lv >= 1750 ? "1750" : lv >= 1730 ? "1730" : lv >= 1720 ? "1720" : lv >= 1710 ? "1710" : lv >= 1700 ? "1700" : "1680";
                    
                    allCharacters.push({ tier, name: char.CharacterName, job: char.CharacterClassName, lv, cp, server: char.ServerName });
                    await new Promise(r => setTimeout(r, 50)); // API 부하 방지
                }
            }

            // 정렬: 레벨 내림차순 -> 전투력 내림차순
            allCharacters.sort((a, b) => b.lv - a.lv || b.cp - a.cp);

            // 화면 그리기
            container.innerHTML = allCharacters.map(c => `
                <div class="list-row row-${c.tier}">
                    <div>${c.tier}</div>
                    <div style="font-weight:bold;">${c.name}</div>
                    <div>${c.job}</div>
                    <div>${c.lv.toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                    <div>${c.cp.toLocaleString()}</div>
                    <div>${c.server}</div>
                </div>
            `).join("");
            container.dataset.loaded = "true";
        } catch (e) {
            container.innerHTML = "<div style='padding:20px; color:red;'>데이터를 불러오지 못했습니다. API 키를 확인하세요.</div>";
        }
    }

    // 기존 멤버별 상세 로드 로직 (생략 없이 유지)
    async function loadFullDetails(charName, charId) {
        /* ... 기존 로직과 동일 (전투력, 패시브, 그리드, 보석 합산 등) ... */
        // (지면 관계상 생략하지만, 유저님이 이전에 쓰시던 보석 로직 코드를 여기에 그대로 두시면 됩니다.)
    }

    function init() {
        const menu = document.getElementById('tabMenu');
        const container = document.getElementById('tabContents');
        
        // 멤버 탭 동적 생성
        Object.keys(MEMBERS).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerText = name;
            btn.onclick = (e) => openTab(e, name);
            menu.appendChild(btn);

            const content = document.createElement('div');
            content.id = name;
            content.className = 'content';
            content.style.display = "none";
            content.innerHTML = `
                <div class="list-header member-grid">
                    <div>캐릭터</div><div>서버</div><div>레벨</div><div>전투력</div><div>최대 전투력</div><div>패시브</div><div>그리드</div><div>보석 현황</div>
                </div>
                <div id="list-${name}"></div>`;
            container.appendChild(content);
        });
    }

    window.onload = init;
</script>
</body>
</html>
