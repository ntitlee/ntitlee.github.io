<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로아 원정대 대시보드</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #4285f4; color: white; border: none; cursor: pointer; }
        .char-card { border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .ark-passive { color: #E65A5A; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>로스트아크 원정대 조회</h1>
        <input type="text" id="charName" placeholder="캐릭터명을 입력하세요">
        <button onclick="updateDashboard()">조회하기</button>
        
        <div id="result">
            </div>
    </div>

    <script>
        const API_KEY = "Bearer YOUR_API_KEY_HERE"; // 여기에 발급받으신 API 키를 넣으세요
        const BASE_URL = "https://developer-lostark.game.onstove.com";

        async function updateDashboard() {
            const name = document.getElementById('charName').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "조회 중...";

            try {
                // 1. 원정대(Siblings) 정보 가져오기
                const response = await fetch(`${BASE_URL}/characters/${encodeURIComponent(name)}/siblings`, {
                    headers: { "Authorization": API_KEY }
                });
                const siblings = await response.json();

                if (!siblings) {
                    resultDiv.innerHTML = "캐릭터를 찾을 수 없습니다.";
                    return;
                }

                // 레벨순 정렬 (작성하신 로직 반영)
                siblings.sort((a, b) => parseFloat(b.ItemAvgLevel.replace(/,/g, "")) - parseFloat(a.ItemAvgLevel.replace(/,/g, "")));

                let html = "";
                // 상위 캐릭터들만 표시 (예: 레벨 1600 이상)
                for (const char of siblings) {
                    const level = parseFloat(char.ItemAvgLevel.replace(/,/g, ""));
                    if (level < 1600) continue;

                    // 아크 패시브 정보 추가 조회
                    const apRes = await fetch(`${BASE_URL}/armories/characters/${encodeURIComponent(char.CharacterName)}/arkpassive`, {
                        headers: { "Authorization": API_KEY }
                    });
                    const apData = await apRes.json();
                    
                    let arkText = "비활성화";
                    if (apData?.Points) {
                        arkText = apData.Points.map(p => {
                            const m = (p.Description || "").match(/(\d+)랭크/);
                            return m ? `${p.Name} ${m[0]}` : "";
                        }).filter(t => t !== "").join(" / ");
                    }

                    html += `
                        <div class="char-card">
                            <strong>${char.CharacterName}</strong> (${char.CharacterClassName}) <br>
                            레벨: ${char.ItemAvgLevel} | 서버: ${char.ServerName} <br>
                            <span class="ark-passive">아크패시브: ${arkText}</span>
                        </div>
                    `;
                }
                resultDiv.innerHTML = html;

            } catch (e) {
                resultDiv.innerHTML = "에러 발생: " + e.message;
            }
        }
    </script>
</body>
</html>
